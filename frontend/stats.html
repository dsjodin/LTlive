<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistik – LTlive</title>
  <link rel="stylesheet" href="stats.css" />
</head>
<body>
  <a class="back" href="/">← Tillbaka till kartan</a>
  <h1>LTlive – <span>Besöksstatistik</span></h1>

  <div class="grid" id="summary"></div>

  <div class="section">
    <div class="section-title">Populäraste sidor (30 dagar)</div>
    <table id="pages-table">
      <thead><tr><th>Sida</th><th>Besök</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title">Senaste 20 besök</div>
    <table id="recent-table">
      <thead><tr><th>Sida</th><th>Tid</th><th>Varaktighet</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <script type="module" src="stats.js"></script>
</body>
</html>
