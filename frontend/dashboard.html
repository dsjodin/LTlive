<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – LTlive</title>
    <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

<div id="topbar">
    <div>
        <span class="topbar-brand">LTlive<span>Dashboard</span></span>
    </div>
    <nav class="topbar-nav">
        <a href="/" class="nav-link">🗺 Karta</a>
        <a href="/busboard.html" class="nav-link">🚏 Buss-tavla</a>
        <a href="/stats.html" class="nav-link">📊 Statistik</a>
        <a href="/dashboard.html" class="nav-link active">⚡ Dashboard</a>
    </nav>
    <div id="last-refresh">
        <span id="status-dot"></span>
        <span id="refresh-time">–</span>
    </div>
</div>

<div id="grid">

    <!-- Vehicle counts -->
    <div class="card card-wide" id="counts-card">
        <div class="count-cell">
            <div class="count-label">Fordon totalt</div>
            <div class="count-value total" id="cnt-total">–</div>
        </div>
        <div class="count-cell">
            <div class="count-label">Bussar</div>
            <div class="count-value buses" id="cnt-buses">–</div>
        </div>
        <div class="count-cell">
            <div class="count-label">Tåg</div>
            <div class="count-value trains" id="cnt-trains">–</div>
        </div>
    </div>

    <!-- Active lines -->
    <div class="card card-wide">
        <div class="card-title">Aktiva linjer</div>
        <div id="lines-wrap">
            <span id="lines-empty">Laddar…</span>
        </div>
    </div>

    <!-- Alerts -->
    <div class="card">
        <div class="card-title">Störningar</div>
        <div id="alerts-list">
            <div id="no-alerts" class="hidden">
                <span class="ok-dot"></span> Inga aktiva störningar
            </div>
        </div>
    </div>

    <!-- System status -->
    <div class="card">
        <div class="card-title">Systemstatus</div>
        <div id="system-status">
            <div class="status-row"><span class="status-key">GTFS-data</span><span class="status-val" id="s-gtfs">–</span></div>
            <div class="status-row"><span class="status-key">SSE-stream</span><span class="status-val" id="s-sse">–</span></div>
            <div class="status-row"><span class="status-key">Senast fordon</span><span class="status-val" id="s-vehicles">–</span></div>
            <div class="status-row"><span class="status-key">Senaste larm</span><span class="status-val" id="s-alerts-time">–</span></div>
        </div>
    </div>

    <!-- Stats -->
    <div class="card">
        <div class="card-title">Statistik idag</div>
        <div class="stat-grid" id="stats-grid">
            <div class="stat-box">
                <div class="stat-box-label">Besök</div>
                <div class="stat-box-value" id="stat-visits">–</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">Unika</div>
                <div class="stat-box-value" id="stat-unique">–</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">Snitt tid</div>
                <div class="stat-box-value" id="stat-duration">–</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">7 dagar</div>
                <div class="stat-box-value" id="stat-week">–</div>
            </div>
        </div>
    </div>

</div>

<script type="module" src="dashboard.js"></script>
<script src="analytics.js"></script>
</body>
</html>
