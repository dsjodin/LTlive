<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Stadstrafiken Örebro – LTlive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f5; --surface: #fff; --border: #ddd;
      --text: #1a1a1a; --muted: #666;
      --panel-bg: #fff; --panel-shadow: 0 -4px 24px rgba(0,0,0,.15);
    }
    body.dark {
      --bg: #121212; --surface: #1e1e1e; --border: #333;
      --text: #f0f0f0; --muted: #aaa;
      --panel-bg: #1e1e1e; --panel-shadow: 0 -4px 24px rgba(0,0,0,.5);
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 14px; z-index: 100;
    }
    #header a { color: var(--muted); text-decoration: none; font-size: 13px; white-space: nowrap; }
    #header a:hover { color: var(--text); }
    #header h1 { font-size: 16px; font-weight: 700; flex: 1; }
    .line-badges { display: flex; gap: 5px; }
    .line-badge {
      width: 24px; height: 24px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
      cursor: pointer; transition: opacity .15s; border: none; outline: none;
    }
    .line-badge.faded { opacity: .3; }
    #vehicle-counts { display: flex; gap: 6px; font-size: 12px; color: var(--muted); }
    .vc-item { display: flex; align-items: center; gap: 3px; }
    .vc-dot { width: 8px; height: 8px; border-radius: 50%; }
    #toolbar { display: flex; gap: 8px; align-items: center; }
    #toolbar button {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 4px 10px; border-radius: 6px;
      font-size: 12px; cursor: pointer;
    }
    #toolbar button:hover { background: var(--border); }

    #map-wrapper {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      overflow: hidden; touch-action: none;
    }
    #schematic-svg {
      width: 100%; height: 100%; cursor: grab; user-select: none; display: block;
    }
    #schematic-svg:active { cursor: grabbing; }

    .line-path { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .stop-circle { cursor: pointer; }
    .stop-label { font-size: 9px; pointer-events: none; fill: var(--text); }
    .vehicle-marker { pointer-events: none; }

    #dep-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--panel-bg); box-shadow: var(--panel-shadow);
      border-radius: 16px 16px 0 0; padding: 0;
      transform: translateY(100%); transition: transform .3s ease;
      z-index: 200; max-height: 60vh; display: flex; flex-direction: column;
    }
    #dep-panel.open { transform: translateY(0); }
    #dep-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    #dep-header { display: flex; align-items: center; padding: 12px 20px 8px; gap: 10px; flex-shrink: 0; }
    #dep-stop-name { font-size: 17px; font-weight: 700; flex: 1; }
    #dep-close {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: var(--border); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center; color: var(--text);
    }
    #dep-lines { display: flex; gap: 6px; padding: 0 20px 10px; flex-wrap: wrap; }
    .dep-line-badge { padding: 2px 9px; border-radius: 12px; font-size: 12px; font-weight: 700; color: #fff; }
    #dep-content { overflow-y: auto; flex: 1; }
    .dep-direction { padding: 8px 20px 4px; border-top: 1px solid var(--border); }
    .dep-direction-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .dep-row { display: flex; align-items: center; padding: 7px 0; gap: 12px; border-bottom: 1px solid var(--border); }
    .dep-row:last-child { border-bottom: none; }
    .dep-line { min-width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .dep-dest { flex: 1; font-size: 14px; }
    .dep-time { font-size: 18px; font-weight: 700; }
    .dep-time.realtime { color: #2e8b3a; }
    .dep-time.soon { color: #e87722; }
    .no-deps, .loading-deps { padding: 20px; text-align: center; color: var(--muted); font-size: 14px; }

    #status-bar {
      position: fixed; top: 52px; left: 50%; transform: translateX(-50%);
      background: #f5a623; color: #fff; padding: 4px 14px; border-radius: 0 0 8px 8px;
      font-size: 12px; z-index: 150; display: none;
    }
    #loading-overlay {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); z-index: 90; font-size: 14px; color: var(--muted);
    }
    #last-update { position: fixed; bottom: 8px; right: 12px; font-size: 11px; color: var(--muted); z-index: 50; pointer-events: none; }
  </style>
</head>
<body>
  <div id="header">
    <a href="/">← Karta</a>
    <h1>Stadstrafiken Örebro</h1>
    <div class="line-badges" id="line-badges"></div>
    <div id="vehicle-counts"></div>
    <div id="toolbar">
      <button id="btn-dark">🌙</button>
      <button id="btn-labels">Etiketter</button>
    </div>
  </div>

  <div id="map-wrapper">
    <svg id="schematic-svg" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
      <g id="g-lines"></g>
      <g id="g-stops"></g>
      <g id="g-labels" style="display:none"></g>
      <g id="g-vehicles"></g>
    </svg>
  </div>

  <div id="loading-overlay">Laddar kartdata…</div>

  <div id="dep-panel">
    <div id="dep-handle"></div>
    <div id="dep-header">
      <div id="dep-stop-name">Hållplats</div>
      <button id="dep-close">×</button>
    </div>
    <div id="dep-lines"></div>
    <div id="dep-content"></div>
  </div>

  <div id="status-bar">Laddar GTFS-data…</div>
  <div id="last-update"></div>

  <script>
  "use strict";

  // ── CONSTANTS ──────────────────────────────────────────────────────────────
  const SVG_W = 1400, SVG_H = 900;
  const CITY_LINES = ["1","2","3","4","5","6","7"];
  const LINE_COLORS = {
    "1": { bg: "#421e55", fg: "#fff" },
    "2": { bg: "#57aa35", fg: "#fff" },
    "3": { bg: "#f04752", fg: "#fff" },
    "4": { bg: "#456670", fg: "#fff" },
    "5": { bg: "#26538f", fg: "#fff" },
    "6": { bg: "#f58232", fg: "#fff" },
    "7": { bg: "#b27ac3", fg: "#fff" },
  };

  // ── STATE ──────────────────────────────────────────────────────────────────
  let projectFn = null;         // (lat, lon) => {x, y}
  let schematicStops = [];      // [{stop_id, stop_name, stop_lat, stop_lon}]
  let vehiclesByLine = {};      // lineNum → [vehicle, ...]
  let labelsVisible = false;
  let darkMode = false;
  let hiddenLines = new Set();
  let svgPan = { x: 0, y: 0, scale: 1, dragging: false, startX: 0, startY: 0, startPanX: 0, startPanY: 0 };
  const RT_POLL_MS = (window.__RT_POLL_SECONDS || 30) * 1000;

  // ── SVG HELPERS ────────────────────────────────────────────────────────────
  const NS = "http://www.w3.org/2000/svg";
  function el(tag, attrs = {}, parent = null) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    if (parent) parent.appendChild(e);
    return e;
  }

  // ── PROJECTION ─────────────────────────────────────────────────────────────
  // Equirectangular projection with aspect-ratio correction via cos(lat).
  // Returns a function (lat, lon) → {x, y} in SVG coordinate space.
  function makeProjection(points) {
    let minLat = Infinity, maxLat = -Infinity;
    let minLon = Infinity, maxLon = -Infinity;
    for (const [lat, lon] of points) {
      if (lat < minLat) minLat = lat;
      if (lat > maxLat) maxLat = lat;
      if (lon < minLon) minLon = lon;
      if (lon > maxLon) maxLon = lon;
    }
    const midLat = (minLat + maxLat) / 2;
    const cosLat = Math.cos(midLat * Math.PI / 180);
    const latSpan = maxLat - minLat;
    const lonSpan = (maxLon - minLon) * cosLat;
    const pad = 70;
    const scale = Math.min((SVG_W - 2 * pad) / lonSpan, (SVG_H - 2 * pad) / latSpan);
    const actualW = lonSpan * scale;
    const actualH = latSpan * scale;
    const offX = (SVG_W - actualW) / 2;
    const offY = (SVG_H - actualH) / 2;
    return (lat, lon) => ({
      x: offX + (lon - minLon) * cosLat * scale,
      y: offY + (maxLat - lat) * scale,
    });
  }

  // Reduce point density: skip points closer than minDist degrees apart.
  function decimateShape(pts, minDist = 0.00015) {
    if (pts.length < 2) return pts;
    const out = [pts[0]];
    for (let i = 1; i < pts.length - 1; i++) {
      const prev = out[out.length - 1];
      const dlat = pts[i][0] - prev[0];
      const dlon = pts[i][1] - prev[1];
      if (dlat * dlat + dlon * dlon >= minDist * minDist) out.push(pts[i]);
    }
    out.push(pts[pts.length - 1]);
    return out;
  }

  function shapeToPath(pts) {
    const dec = decimateShape(pts);
    return "M" + dec.map(([lat, lon]) => {
      const { x, y } = projectFn(lat, lon);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join("L");
  }

  // ── LOAD & BUILD ───────────────────────────────────────────────────────────
  async function loadAndBuild() {
    // 1. Find route_ids for city lines 1-7
    const routesData = await fetch("/api/routes/all").then(r => r.json());
    const cityRoutes = routesData.routes.filter(r => CITY_LINES.includes(r.route_short_name));

    if (!cityRoutes.length) {
      document.getElementById("loading-overlay").textContent = "Inga stadstrafik-linjer hittades i GTFS-data.";
      return;
    }

    // Group route_ids by short name (a line can have multiple route_ids)
    const byName = {};
    for (const r of cityRoutes) {
      if (!byName[r.route_short_name]) byName[r.route_short_name] = [];
      byName[r.route_short_name].push(r.route_id);
    }

    // 2. Fetch shapes for each line in parallel, deduplicate by shape_id
    const shapesByLine = {}; // lineNum → { shape_id: [[lat,lon],...] }
    await Promise.all(Object.entries(byName).map(async ([lineNum, routeIds]) => {
      const merged = {};
      await Promise.all(routeIds.map(async rid => {
        const data = await fetch(`/api/shapes/${rid}`).then(r => r.json());
        Object.assign(merged, data.shapes || {});
      }));
      shapesByLine[lineNum] = merged;
    }));

    // 3. Fetch stops for these routes
    const allRouteIds = cityRoutes.map(r => r.route_id).join(",");
    const stopsData = await fetch(`/api/stops?route_ids=${allRouteIds}`).then(r => r.json());
    schematicStops = (stopsData.stops || []).filter(s => s.stop_lat && s.stop_lon && s.location_type === 0);

    // 4. Build projection from all shape points
    const allPoints = [];
    for (const shapes of Object.values(shapesByLine)) {
      for (const pts of Object.values(shapes)) {
        for (const pt of pts) allPoints.push(pt);
      }
    }
    if (!allPoints.length) {
      document.getElementById("loading-overlay").textContent = "Inga ruttformer hittades.";
      return;
    }
    projectFn = makeProjection(allPoints);

    // 5. Render
    buildSchematic(shapesByLine);
    document.getElementById("loading-overlay").style.display = "none";
  }

  // ── RENDER SCHEMATIC ───────────────────────────────────────────────────────
  function buildSchematic(shapesByLine) {
    const gLines = document.getElementById("g-lines");
    const gStops = document.getElementById("g-stops");
    const gLabels = document.getElementById("g-labels");

    // Draw route shapes – render order: thick background lines first
    const drawOrder = ["4", "5", "6", "3", "2", "7", "1"];
    for (const lineNum of drawOrder) {
      const shapes = shapesByLine[lineNum];
      if (!shapes) continue;
      const color = LINE_COLORS[lineNum].bg;
      for (const pts of Object.values(shapes)) {
        el("path", {
          d: shapeToPath(pts),
          class: "line-path",
          stroke: color,
          "stroke-width": "5",
          fill: "none",
          "data-line": lineNum,
        }, gLines);
      }
    }

    // Draw stops as small circles
    for (const s of schematicStops) {
      const { x, y } = projectFn(s.stop_lat, s.stop_lon);
      const g = el("g", { cursor: "pointer", "data-stop-id": s.stop_id }, gStops);
      g.addEventListener("click", () => onStopClick(s));
      el("circle", {
        cx: x.toFixed(1), cy: y.toFixed(1), r: 3.5,
        fill: "#fff", stroke: "#555", "stroke-width": "1.5",
        class: "stop-circle",
      }, g);
      el("text", {
        x: (x + 6).toFixed(1), y: (y + 3.5).toFixed(1),
        class: "stop-label", "text-anchor": "start", "pointer-events": "none",
      }, gLabels).textContent = s.stop_name;
    }
  }

  // ── VEHICLES ───────────────────────────────────────────────────────────────
  async function fetchVehicles() {
    try {
      const data = await fetch("/api/vehicles").then(r => r.json());
      vehiclesByLine = {};
      for (const v of (data.vehicles || [])) {
        const ln = v.route_short_name || v.line;
        if (!ln || !LINE_COLORS[ln]) continue;
        if (!vehiclesByLine[ln]) vehiclesByLine[ln] = [];
        vehiclesByLine[ln].push(v);
      }
      renderVehicles();
      updateVehicleCounts();
      document.getElementById("last-update").textContent = "Uppdaterad " + new Date().toLocaleTimeString("sv-SE");
    } catch (e) { console.warn("Vehicle fetch failed:", e); }
  }

  function renderVehicles() {
    if (!projectFn) return;
    const g = document.getElementById("g-vehicles");
    g.innerHTML = "";
    for (const [lineNum, vehicles] of Object.entries(vehiclesByLine)) {
      if (hiddenLines.has(lineNum)) continue;
      const { bg, fg } = LINE_COLORS[lineNum];
      for (const v of vehicles) {
        if (!v.lat || !v.lon) continue;
        const { x, y } = projectFn(v.lat, v.lon);
        const vg = el("g", { transform: `translate(${x.toFixed(1)},${y.toFixed(1)})`, class: "vehicle-marker" }, g);
        el("circle", { cx: 0, cy: 0, r: 9, fill: bg, stroke: "#fff", "stroke-width": 2 }, vg);
        el("text", { x: 0, y: 4, "text-anchor": "middle", "font-size": "8", "font-weight": "800", fill: fg, "pointer-events": "none" }, vg).textContent = lineNum;
      }
    }
  }

  function updateVehicleCounts() {
    const vcEl = document.getElementById("vehicle-counts");
    vcEl.innerHTML = Object.entries(vehiclesByLine)
      .filter(([, vs]) => vs.length > 0)
      .map(([ln, vs]) => `<span class="vc-item"><span class="vc-dot" style="background:${LINE_COLORS[ln].bg}"></span>${vs.length}</span>`)
      .join("");
  }

  // ── STOP CLICK & DEPARTURES ────────────────────────────────────────────────
  function onStopClick(stop) {
    const panel = document.getElementById("dep-panel");
    document.getElementById("dep-stop-name").textContent = stop.stop_name;
    document.getElementById("dep-lines").innerHTML = "";
    document.getElementById("dep-content").innerHTML = '<div class="loading-deps">Hämtar avgångar…</div>';
    panel.classList.add("open");
    loadDepartures(stop.stop_id);
  }

  async function loadDepartures(stopId) {
    const contentEl = document.getElementById("dep-content");
    const linesEl = document.getElementById("dep-lines");
    try {
      const data = await fetch(`/api/departures/${stopId}`).then(r => r.json());
      const deps = data.departures || [];
      if (!deps.length) {
        contentEl.innerHTML = '<div class="no-deps">Inga avgångar hittades just nu.</div>';
        return;
      }

      // Show line badges from actual departures
      const seen = new Set();
      linesEl.innerHTML = deps.slice(0, 10)
        .filter(d => { const ln = d.route_short_name; if (seen.has(ln)) return false; seen.add(ln); return true; })
        .map(d => {
          const bg = LINE_COLORS[d.route_short_name]?.bg || `#${d.route_color || "888"}`;
          const fg = LINE_COLORS[d.route_short_name]?.fg || `#${d.route_text_color || "fff"}`;
          return `<span class="dep-line-badge" style="background:${bg};color:${fg}">${d.route_short_name}</span>`;
        }).join("");

      const nowSec = Math.floor(Date.now() / 1000);
      const byDir = {};
      for (const d of deps) {
        const dir = d.headsign || "–";
        if (!byDir[dir]) byDir[dir] = [];
        byDir[dir].push(d);
      }

      let html = "";
      for (const [dir, dirDeps] of Object.entries(byDir)) {
        html += `<div class="dep-direction"><div class="dep-direction-label">→ ${dir}</div>`;
        for (const d of dirDeps.slice(0, 5)) {
          const ln = d.route_short_name || "?";
          const bg = LINE_COLORS[ln]?.bg || `#${d.route_color || "888"}`;
          const fg = LINE_COLORS[ln]?.fg || `#${d.route_text_color || "fff"}`;
          const mins = Math.round((d.departure_time - nowSec) / 60);
          const cls = mins <= 1 ? "dep-time soon" : (d.is_realtime ? "dep-time realtime" : "dep-time");
          const label = mins <= 0 ? "Nu" : mins === 1 ? "1 min" : `${mins} min`;
          const rt = d.is_realtime ? '<span style="color:#2e8b3a;font-size:9px">●RT </span>' : "";
          html += `<div class="dep-row">
            <div class="dep-line" style="background:${bg};color:${fg}">${ln}</div>
            <div class="dep-dest">${rt}${dir}</div>
            <span class="${cls}">${label}</span>
          </div>`;
        }
        html += "</div>";
      }
      contentEl.innerHTML = html;
    } catch (e) {
      contentEl.innerHTML = `<div class="no-deps">Kunde inte hämta avgångar.<br><small>${e.message}</small></div>`;
    }
  }

  // ── LINE FILTER BADGES ─────────────────────────────────────────────────────
  function buildLineBadges() {
    const container = document.getElementById("line-badges");
    for (const ln of CITY_LINES) {
      const btn = document.createElement("button");
      btn.className = "line-badge";
      btn.textContent = ln;
      btn.style.background = LINE_COLORS[ln].bg;
      btn.style.color = LINE_COLORS[ln].fg;
      btn.title = `Linje ${ln}`;
      btn.addEventListener("click", () => {
        if (hiddenLines.has(ln)) hiddenLines.delete(ln);
        else hiddenLines.add(ln);
        btn.classList.toggle("faded", hiddenLines.has(ln));
        applyLineVisibility();
      });
      container.appendChild(btn);
    }
  }

  function applyLineVisibility() {
    document.querySelectorAll(".line-path").forEach(p => {
      p.style.opacity = hiddenLines.has(p.dataset.line) ? "0.07" : "1";
    });
    renderVehicles();
  }

  // ── PAN & ZOOM ─────────────────────────────────────────────────────────────
  function initPanZoom() {
    const wrapper = document.getElementById("map-wrapper");
    const svg = document.getElementById("schematic-svg");

    function applyTransform() {
      const vx = -svgPan.x / svgPan.scale;
      const vy = -svgPan.y / svgPan.scale;
      svg.setAttribute("viewBox", `${vx} ${vy} ${SVG_W / svgPan.scale} ${SVG_H / svgPan.scale}`);
    }

    wrapper.addEventListener("mousedown", e => {
      svgPan.dragging = true;
      svgPan.startX = e.clientX; svgPan.startY = e.clientY;
      svgPan.startPanX = svgPan.x; svgPan.startPanY = svgPan.y;
    });
    window.addEventListener("mousemove", e => {
      if (!svgPan.dragging) return;
      svgPan.x = svgPan.startPanX + (e.clientX - svgPan.startX);
      svgPan.y = svgPan.startPanY + (e.clientY - svgPan.startY);
      applyTransform();
    });
    window.addEventListener("mouseup", () => { svgPan.dragging = false; });

    wrapper.addEventListener("wheel", e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const newScale = Math.max(0.4, Math.min(8, svgPan.scale * delta));
      const rect = wrapper.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      svgPan.x = mx - (mx - svgPan.x) * (newScale / svgPan.scale);
      svgPan.y = my - (my - svgPan.y) * (newScale / svgPan.scale);
      svgPan.scale = newScale;
      applyTransform();
    }, { passive: false });

    let lastTouchDist = 0;
    wrapper.addEventListener("touchstart", e => {
      if (e.touches.length === 1) {
        svgPan.dragging = true;
        svgPan.startX = e.touches[0].clientX; svgPan.startY = e.touches[0].clientY;
        svgPan.startPanX = svgPan.x; svgPan.startPanY = svgPan.y;
      } else if (e.touches.length === 2) {
        svgPan.dragging = false;
        lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      }
    }, { passive: true });
    wrapper.addEventListener("touchmove", e => {
      e.preventDefault();
      if (e.touches.length === 1 && svgPan.dragging) {
        svgPan.x = svgPan.startPanX + (e.touches[0].clientX - svgPan.startX);
        svgPan.y = svgPan.startPanY + (e.touches[0].clientY - svgPan.startY);
        applyTransform();
      } else if (e.touches.length === 2 && lastTouchDist > 0) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        svgPan.scale = Math.max(0.4, Math.min(8, svgPan.scale * dist / lastTouchDist));
        lastTouchDist = dist;
        applyTransform();
      }
    }, { passive: false });
    wrapper.addEventListener("touchend", () => { svgPan.dragging = false; lastTouchDist = 0; });
  }

  // ── DARK MODE & LABELS ─────────────────────────────────────────────────────
  function applyDarkMode(dark) {
    darkMode = dark;
    document.body.classList.toggle("dark", dark);
    document.getElementById("btn-dark").textContent = dark ? "☀️" : "🌙";
  }

  function toggleLabels() {
    labelsVisible = !labelsVisible;
    document.getElementById("g-labels").style.display = labelsVisible ? "" : "none";
    document.getElementById("btn-labels").style.opacity = labelsVisible ? "1" : "0.4";
  }

  // ── STATUS CHECK ───────────────────────────────────────────────────────────
  async function checkStatus() {
    try {
      const d = await fetch("/api/health").then(r => r.json());
      document.getElementById("status-bar").style.display = d.gtfs_loaded ? "none" : "block";
    } catch (e) {}
  }

  // ── INIT ───────────────────────────────────────────────────────────────────
  async function init() {
    buildLineBadges();
    initPanZoom();

    document.getElementById("dep-close").addEventListener("click", () => {
      document.getElementById("dep-panel").classList.remove("open");
    });
    document.getElementById("btn-dark").addEventListener("click", () => applyDarkMode(!darkMode));
    document.getElementById("btn-labels").addEventListener("click", toggleLabels);

    if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) applyDarkMode(true);

    await checkStatus();
    await loadAndBuild();
    await fetchVehicles();

    setInterval(fetchVehicles, Math.max(RT_POLL_MS, 30000));
    setInterval(checkStatus, 30000);
  }

  document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
