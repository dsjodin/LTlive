<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Stadstrafiken Örebro – LTlive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f5; --surface: #fff; --border: #ddd;
      --text: #1a1a1a; --muted: #666; --hub-bg: #1565C0;
      --panel-bg: #fff; --panel-shadow: 0 -4px 24px rgba(0,0,0,.15);
    }
    body.dark {
      --bg: #121212; --surface: #1e1e1e; --border: #333;
      --text: #f0f0f0; --muted: #aaa; --hub-bg: #1976D2;
      --panel-bg: #1e1e1e; --panel-shadow: 0 -4px 24px rgba(0,0,0,.5);
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 14px; z-index: 100;
    }
    #header a { color: var(--muted); text-decoration: none; font-size: 13px; white-space: nowrap; }
    #header a:hover { color: var(--text); }
    #header h1 { font-size: 16px; font-weight: 700; flex: 1; }
    .line-badges { display: flex; gap: 5px; }
    .line-badge {
      width: 24px; height: 24px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
      cursor: pointer; transition: opacity .15s;
    }
    .line-badge.faded { opacity: .3; }
    #vehicle-counts { display: flex; gap: 6px; font-size: 12px; color: var(--muted); }
    .vc-item { display: flex; align-items: center; gap: 3px; }
    .vc-dot { width: 8px; height: 8px; border-radius: 50%; }
    #toolbar { display: flex; gap: 8px; align-items: center; }
    #toolbar button {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 4px 10px; border-radius: 6px;
      font-size: 12px; cursor: pointer;
    }
    #toolbar button:hover { background: var(--border); }

    #map-wrapper {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      overflow: hidden; touch-action: none;
    }
    #schematic-svg {
      width: 100%; height: 100%; cursor: grab; user-select: none;
      display: block;
    }
    #schematic-svg:active { cursor: grabbing; }

    /* SVG element styles */
    .line-path { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .stop-circle { cursor: pointer; transition: r .1s; }
    .stop-circle:hover { }
    .stop-label { font-size: 11px; pointer-events: none; fill: var(--text); }
    .hub-circle { cursor: pointer; }
    .terminal-label { font-size: 14px; font-weight: 700; pointer-events: none; fill: var(--text); }
    .line-number-badge { pointer-events: none; }
    .landmark-icon { pointer-events: none; }
    .vehicle-marker { pointer-events: none; transition: cx .5s, cy .5s; }

    /* Departure panel */
    #dep-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--panel-bg); box-shadow: var(--panel-shadow);
      border-radius: 16px 16px 0 0; padding: 0;
      transform: translateY(100%); transition: transform .3s ease;
      z-index: 200; max-height: 60vh; display: flex; flex-direction: column;
    }
    #dep-panel.open { transform: translateY(0); }
    #dep-handle {
      width: 40px; height: 4px; background: var(--border); border-radius: 2px;
      margin: 10px auto 0;
    }
    #dep-header {
      display: flex; align-items: center; padding: 12px 20px 8px;
      gap: 10px; flex-shrink: 0;
    }
    #dep-stop-name { font-size: 17px; font-weight: 700; flex: 1; }
    #dep-close {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: var(--border); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center; color: var(--text);
    }
    #dep-lines { display: flex; gap: 6px; padding: 0 20px 10px; flex-wrap: wrap; }
    .dep-line-badge {
      padding: 2px 9px; border-radius: 12px; font-size: 12px; font-weight: 700; color: #fff;
    }
    #dep-content { overflow-y: auto; flex: 1; }
    .dep-direction { padding: 8px 20px 4px; border-top: 1px solid var(--border); }
    .dep-direction-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
    }
    .dep-row {
      display: flex; align-items: center; padding: 7px 0; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .dep-row:last-child { border-bottom: none; }
    .dep-line {
      min-width: 28px; height: 28px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .dep-dest { flex: 1; font-size: 14px; }
    .dep-time { font-size: 18px; font-weight: 700; }
    .dep-time.realtime { color: #2e8b3a; }
    .dep-time.soon { color: #e87722; }
    .dep-track { font-size: 11px; color: var(--muted); }
    .no-deps { padding: 20px; text-align: center; color: var(--muted); font-size: 14px; }
    .loading-deps { padding: 20px; text-align: center; color: var(--muted); font-size: 14px; }

    #status-bar {
      position: fixed; top: 52px; left: 50%; transform: translateX(-50%);
      background: #f5a623; color: #fff; padding: 4px 14px; border-radius: 0 0 8px 8px;
      font-size: 12px; z-index: 150; display: none;
    }
    #last-update {
      position: fixed; bottom: 8px; right: 12px;
      font-size: 11px; color: var(--muted); z-index: 50; pointer-events: none;
    }
  </style>
</head>

  };

  // ── GLOBALS ────────────────────────────────────────────────────────────────
  const RT_POLL_MS = (window.__RT_POLL_SECONDS || 180) * 1000;
  let stopNameToId = {};   // GTFS name → stop_id
  let stopNameToIdAlt = {}; // normalized → stop_id
  let vehiclesByLine = {};  // line → [vehicles]
  let labelsVisible = true;
  let darkMode = false;
  let hiddenLines = new Set();
  let selectedStopId = null;
  let svgPan = { x: 0, y: 0, scale: 1, dragging: false, startX: 0, startY: 0, startPanX: 0, startPanY: 0 };

  // ── SVG HELPERS ────────────────────────────────────────────────────────────
  const NS = "http://www.w3.org/2000/svg";
  function el(tag, attrs={}, parent=null) {
    const e = document.createElementNS(NS, tag);
    for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
    if (parent) parent.appendChild(e);
    return e;
  }

  function resolveStop(id) {
    if (id.startsWith("t-")) {
      const t = TERMINALS[id];
      if (t) return t;
    }
    return STOPS[id];
  }

  function getLineOffset(lineNum, stopId) {
    // Perpendicular offset for parallel lines sharing a node
    return 0; // simplified — all lines pass through exact node coords
  }

  // ── RENDER SCHEMATIC ───────────────────────────────────────────────────────
  function buildSchematic() {
    const gLines   = document.getElementById("g-lines");
    const gStops   = document.getElementById("g-stops");
    const gLabels  = document.getElementById("g-labels");

    // Draw lines
    for (const [lineNum, stopIds] of Object.entries(LINE_PATHS)) {
      const color = C[lineNum].bg;
      const coords = stopIds.map(id => resolveStop(id)).filter(Boolean);
      if (coords.length < 2) continue;

      // Build smooth path using straight segments with rounded corners at bends
      let d = `M ${coords[0].x} ${coords[0].y}`;
      for (let i = 1; i < coords.length; i++) {
        const p = coords[i];
        d += ` L ${p.x} ${p.y}`;
      }
      el("path", {
        d, class: "line-path",
        stroke: color, "stroke-width": "7",
        "stroke-linecap": "round", "stroke-linejoin": "round",
        fill: "none",
        "data-line": lineNum,
      }, gLines);
    }

    // Draw stops
    const drawnStops = new Set();
    for (const [id, s] of Object.entries(STOPS)) {
      if (drawnStops.has(id)) continue;
      drawnStops.add(id);

      if (s.hub) {
        // Large hub circle
        const g = el("g", { class: "hub-group", "data-stop-id": id, cursor: "pointer" }, gStops);
        g.addEventListener("click", () => onStopClick(id, s));
        el("circle", { cx: s.x, cy: s.y, r: 22, fill: "#1565C0", stroke: "#fff", "stroke-width": 3 }, g);
        // Line badges inside hub
        const lines = s.lines;
        const cols = Math.min(lines.length, 4);
        const rows = Math.ceil(lines.length / cols);
        const bw = 13, bh = 13, gap = 2;
        const totalW = cols * bw + (cols-1) * gap;
        const totalH = rows * bh + (rows-1) * gap;
        const ox = s.x - totalW/2 + bw/2;
        const oy = s.y - totalH/2 + bh/2;
        lines.forEach((ln, i) => {
          const col = i % cols, row = Math.floor(i / cols);
          const bx = ox + col*(bw+gap), by = oy + row*(bh+gap);
          el("rect", { x: bx-bw/2, y: by-bh/2, width: bw, height: bh, rx: 3,
            fill: C[ln].bg }, g);
          el("text", { x: bx, y: by+4.5, "text-anchor": "middle",
            "font-size": "8.5", "font-weight": "700", fill: C[ln].fg,
            "pointer-events": "none" }, g).textContent = ln;
        });
        // Hub name label
        const lbl = el("text", {
          x: s.x, y: s.y + 34,
          "text-anchor": "middle", "font-size": "12.5", "font-weight": "700",
          class: "hub-label", fill: "#1565C0", "pointer-events": "none"
        }, gLabels);
        lbl.textContent = s.name;

      } else {
        // Regular stop
        const multiLine = s.lines.length > 1;
        const r = multiLine ? 6 : 4.5;
        const fillColor = s.lines.length === 1 ? C[s.lines[0]].bg : "#fff";
        const strokeColor = s.lines.length === 1 ? "#fff" : C[s.lines[0]].bg;

        const g = el("g", { class: "stop-group", "data-stop-id": id, cursor: "pointer" }, gStops);
        g.addEventListener("click", () => onStopClick(id, s));
        el("circle", {
          cx: s.x, cy: s.y, r,
          fill: fillColor, stroke: strokeColor, "stroke-width": "2",
          class: "stop-circle"
        }, g);

        // Label — positioned to avoid overlap (alternating sides)
        const anchor = s.x < 820 ? "end" : "start";
        const dx = s.x < 820 ? -9 : 9;
        const lbl = el("text", {
          x: s.x + dx, y: s.y + 4,
          "text-anchor": anchor, "font-size": "10.5",
          class: "stop-label", "pointer-events": "none"
        }, gLabels);
        lbl.textContent = s.name;
      }
    }

    // Draw terminals
    for (const [id, t] of Object.entries(TERMINALS)) {
      const color = C[t.line].bg;
      const g = el("g", { class: "terminal-group" }, gStops);
      el("circle", { cx: t.x, cy: t.y, r: 16,
        fill: color, stroke: "#fff", "stroke-width": 3 }, g);
      el("text", {
        x: t.x, y: t.y + 5.5, "text-anchor": "middle",
        "font-size": "13", "font-weight": "800", fill: C[t.line].fg,
        "pointer-events": "none"
      }, g).textContent = t.line;

      // Terminal name
      const isTop  = t.y < 200;
      const isLeft = t.x < 200;
      const isBot  = t.y > 750;
      let tx = t.x, ty = t.y, anchor = "middle";
      if (isTop)  { ty = t.y - 24; }
      if (isBot)  { ty = t.y + 28; }
      if (isLeft) { tx = t.x + 25; ty = t.y + 5; anchor = "start"; }
      if (!isTop && !isBot && !isLeft && t.x > 1200) { tx = t.x + 24; ty = t.y + 5; anchor = "start"; }
      if (!isTop && !isBot && !isLeft && t.x < 300 && t.y > 400) { tx = t.x + 25; ty = t.y + 5; anchor = "start"; }

      el("text", {
        x: tx, y: ty, "text-anchor": anchor,
        "font-size": "15", "font-weight": "800",
        class: "terminal-label", "pointer-events": "none"
      }, gLabels).textContent = t.name;
    }

    // Landmark icons (simple SVG symbols)
    renderLandmark("svampen-stop",  "🌊", "SVAMPEN");
    renderLandmark("slottet",       "🏰", "ÖREBRO SLOTT");
    renderLandmark("uso-e",         "🏥", "USÖ");
    renderLandmark("wadkoping",     "🎨", "WADKÖPING");
  }

  function renderLandmark(stopId, emoji, label) {
    const s = STOPS[stopId];
    if (!s) return;
    const gLabels = document.getElementById("g-labels");
    // Already drawn as stop — just add an icon label above
    el("text", {
      x: s.x, y: s.y - 12,
      "text-anchor": "middle", "font-size": "14",
      "pointer-events": "none"
    }, gLabels).textContent = emoji;
  }

  // ── STOP CLICK & DEPARTURES ────────────────────────────────────────────────
  async function onStopClick(stopId, stopData) {
    const panel = document.getElementById("dep-panel");
    const nameEl = document.getElementById("dep-stop-name");
    const linesEl = document.getElementById("dep-lines");
    const contentEl = document.getElementById("dep-content");

    nameEl.textContent = stopData.name;
    linesEl.innerHTML = stopData.lines.map(ln =>
      `<span class="dep-line-badge" style="background:${C[ln].bg};color:${C[ln].fg}">${ln}</span>`
    ).join("");
    contentEl.innerHTML = '<div class="loading-deps">Hämtar avgångar…</div>';
    panel.classList.add("open");

    // Try to find the GTFS stop_id by name
    const gtfsId = lookupStopId(stopData.name);
    if (!gtfsId) {
      contentEl.innerHTML = `<div class="no-deps">Hållplats hittades inte i GTFS-data.<br><small>${stopData.name}</small></div>`;
      return;
    }

    selectedStopId = gtfsId;
    await loadDepartures(gtfsId, stopData.lines);
  }

  async function loadDepartures(stopId, lines) {
    const contentEl = document.getElementById("dep-content");
    try {
      const resp = await fetch(`/api/departures/${stopId}`);
      if (!resp.ok) throw new Error(resp.statusText);
      const data = await resp.json();

      const deps = data.departures || [];
      if (!deps.length) {
        contentEl.innerHTML = '<div class="no-deps">Inga avgångar hittades just nu.</div>';
        return;
      }

      const nowSec = Math.floor(Date.now() / 1000);

      // Group by direction (headsign)
      const byDir = {};
      for (const d of deps) {
        const dir = d.headsign || "–";
        if (!byDir[dir]) byDir[dir] = [];
        byDir[dir].push(d);
      }

      let html = "";
      for (const [dir, dirDeps] of Object.entries(byDir)) {
        html += `<div class="dep-direction">`;
        html += `<div class="dep-direction-label">→ ${dir}</div>`;
        dirDeps.slice(0, 5).forEach(d => {
          const lineNum = d.route_short_name || "?";
          const bg = C[lineNum] ? C[lineNum].bg : `#${d.route_color || "888"}`;
          const fg = C[lineNum] ? C[lineNum].fg : `#${d.route_text_color || "fff"}`;
          const mins = Math.round((d.departure_time - nowSec) / 60);
          const cls = mins <= 1 ? "dep-time soon" : (d.is_realtime ? "dep-time realtime" : "dep-time");
          const label = mins <= 0 ? "Nu" : mins === 1 ? "1 min" : `${mins} min`;
          const rtDot = d.is_realtime ? '<span style="color:#2e8b3a;font-size:9px">●RT </span>' : '';
          html += `<div class="dep-row">
            <div class="dep-line" style="background:${bg};color:${fg}">${lineNum}</div>
            <div class="dep-dest">${rtDot}${dir}</div>
            <span class="${cls}">${label}</span>
          </div>`;
        });
        html += "</div>";
      }
      contentEl.innerHTML = html;
    } catch(e) {
      contentEl.innerHTML = `<div class="no-deps">Kunde inte hämta avgångar.<br><small>${e.message}</small></div>`;
    }
  }

  function lookupStopId(name) {
    // Exact match
    if (stopNameToId[name]) return stopNameToId[name];
    // Normalized match
    const norm = normalizeName(name);
    if (stopNameToIdAlt[norm]) return stopNameToIdAlt[norm];
    return null;
  }

  function normalizeName(name) {
    return name.toLowerCase()
      .replace(/ä/g,"a").replace(/å/g,"a").replace(/ö/g,"o")
      .replace(/[^a-z0-9]/g,"");
  }

  // ── LOAD GTFS STOPS ────────────────────────────────────────────────────────
  async function loadStops() {
    try {
      const resp = await fetch("/api/stops");
      if (!resp.ok) return;
      const data = await resp.json();
      const stops = data.stops || [];
      for (const s of stops) {
        const n = s.stop_name || s.name;
        const id = s.stop_id || s.id;
        if (n && id) {
          stopNameToId[n] = id;
          stopNameToIdAlt[normalizeName(n)] = id;
        }
      }
    } catch(e) { console.warn("Could not load stops:", e); }
  }

  // ── LIVE VEHICLES ──────────────────────────────────────────────────────────
  async function fetchVehicles() {
    try {
      const resp = await fetch("/api/vehicles");
      if (!resp.ok) return;
      const data = await resp.json();
      const vehicles = data.vehicles || [];

      vehiclesByLine = {};
      for (const v of vehicles) {
        const ln = v.route_short_name || v.line;
        if (!ln || !C[ln]) continue;
        if (!vehiclesByLine[ln]) vehiclesByLine[ln] = [];
        vehiclesByLine[ln].push(v);
      }
      renderVehicles();
      updateVehicleCounts();
      document.getElementById("last-update").textContent =
        "Uppdaterad " + new Date().toLocaleTimeString("sv-SE");
    } catch(e) { console.warn("Vehicle fetch failed:", e); }
  }

  function renderVehicles() {
    const g = document.getElementById("g-vehicles");
    g.innerHTML = "";

    for (const [lineNum, vehicles] of Object.entries(vehiclesByLine)) {
      if (hiddenLines.has(lineNum)) continue;
      const color = C[lineNum].bg;

      for (const v of vehicles) {
        // Find schematic position: map next_stop_id → schematic coords
        const schCoords = getSchematicPosition(v, lineNum);
        if (!schCoords) continue;

        // Draw a small triangle (arrowhead) at the position
        const { x, y } = schCoords;
        const r = 9;
        const vg = el("g", { transform: `translate(${x},${y})`, class: "vehicle-marker" }, g);
        el("circle", { cx: 0, cy: 0, r, fill: color, stroke: "#fff", "stroke-width": 2 }, vg);
        el("text", { x: 0, y: 4, "text-anchor": "middle",
          "font-size": "8", "font-weight": "800", fill: C[lineNum].fg,
          "pointer-events": "none" }, vg).textContent = lineNum;
      }
    }
  }

  function getSchematicPosition(vehicle, lineNum) {
    // Try to match vehicle's current stop to a schematic stop
    const nextStopId = vehicle.next_stop_id || vehicle.stop_id || vehicle.current_stop_id;
    if (nextStopId) {
      // Find schematic stop matching this GTFS stop_id
      for (const [sid, s] of Object.entries(STOPS)) {
        const gtfsId = lookupStopId(s.name);
        if (gtfsId === nextStopId || gtfsId === String(nextStopId)) {
          // Small stable jitter per vehicle_id so multiple buses at same stop don't overlap
          const hash = (vehicle.vehicle_id || "").split("").reduce((h,c) => (h*31+c.charCodeAt(0))|0, 0);
          return { x: s.x + (hash % 10) - 5, y: s.y + ((hash >> 4) % 10) - 5 };
        }
      }
    }

    // Fallback: no match, don't render
    return null;
  }

  function updateVehicleCounts() {
    const el = document.getElementById("vehicle-counts");
    const parts = [];
    for (const [ln, vs] of Object.entries(vehiclesByLine)) {
      if (vs.length > 0 && C[ln]) {
        parts.push(`<span class="vc-item"><span class="vc-dot" style="background:${C[ln].bg}"></span>${vs.length}</span>`);
      }
    }
    el.innerHTML = parts.join("");
  }

  // ── LINE FILTER BADGES ─────────────────────────────────────────────────────
  function buildLineBadges() {
    const container = document.getElementById("line-badges");
    container.innerHTML = "";
    ["1","2","3","4","5","6","7"].forEach(ln => {
      const btn = document.createElement("button");
      btn.className = "line-badge";
      btn.textContent = ln;
      btn.style.background = C[ln].bg;
      btn.style.color = C[ln].fg;
      btn.style.border = "none";
      btn.style.outline = "none";
      btn.title = `Linje ${ln}`;
      btn.addEventListener("click", () => {
        if (hiddenLines.has(ln)) hiddenLines.delete(ln);
        else hiddenLines.add(ln);
        btn.classList.toggle("faded", hiddenLines.has(ln));
        applyLineVisibility();
      });
      container.appendChild(btn);
    });
  }

  function applyLineVisibility() {
    document.querySelectorAll(".line-path").forEach(p => {
      const ln = p.dataset.line;
      p.style.opacity = hiddenLines.has(ln) ? "0.08" : "1";
    });
    renderVehicles();
  }

  // ── PAN & ZOOM ─────────────────────────────────────────────────────────────
  function initPanZoom() {
    const wrapper = document.getElementById("map-wrapper");
    const svg = document.getElementById("schematic-svg");

    function applyTransform() {
      svg.setAttribute("viewBox",
        `${-svgPan.x/svgPan.scale} ${-svgPan.y/svgPan.scale} ${1700/svgPan.scale} ${960/svgPan.scale}`);
    }

    // Mouse drag
    wrapper.addEventListener("mousedown", e => {
      svgPan.dragging = true;
      svgPan.startX = e.clientX;
      svgPan.startY = e.clientY;
      svgPan.startPanX = svgPan.x;
      svgPan.startPanY = svgPan.y;
    });
    window.addEventListener("mousemove", e => {
      if (!svgPan.dragging) return;
      svgPan.x = svgPan.startPanX + (e.clientX - svgPan.startX);
      svgPan.y = svgPan.startPanY + (e.clientY - svgPan.startY);
      applyTransform();
    });
    window.addEventListener("mouseup", () => { svgPan.dragging = false; });

    // Wheel zoom
    wrapper.addEventListener("wheel", e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const newScale = Math.max(0.5, Math.min(5, svgPan.scale * delta));
      // Zoom toward mouse position
      const rect = wrapper.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      svgPan.x = mx - (mx - svgPan.x) * (newScale / svgPan.scale);
      svgPan.y = my - (my - svgPan.y) * (newScale / svgPan.scale);
      svgPan.scale = newScale;
      applyTransform();
    }, { passive: false });

    // Touch support
    let lastTouchDist = 0;
    wrapper.addEventListener("touchstart", e => {
      if (e.touches.length === 1) {
        svgPan.dragging = true;
        svgPan.startX = e.touches[0].clientX;
        svgPan.startY = e.touches[0].clientY;
        svgPan.startPanX = svgPan.x;
        svgPan.startPanY = svgPan.y;
      } else if (e.touches.length === 2) {
        svgPan.dragging = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDist = Math.hypot(dx, dy);
      }
    }, { passive: true });
    wrapper.addEventListener("touchmove", e => {
      e.preventDefault();
      if (e.touches.length === 1 && svgPan.dragging) {
        svgPan.x = svgPan.startPanX + (e.touches[0].clientX - svgPan.startX);
        svgPan.y = svgPan.startPanY + (e.touches[0].clientY - svgPan.startY);
        applyTransform();
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        if (lastTouchDist > 0) {
          const delta = dist / lastTouchDist;
          svgPan.scale = Math.max(0.5, Math.min(5, svgPan.scale * delta));
          applyTransform();
        }
        lastTouchDist = dist;
      }
    }, { passive: false });
    wrapper.addEventListener("touchend", () => { svgPan.dragging = false; lastTouchDist = 0; });
  }

  // ── DARK MODE ──────────────────────────────────────────────────────────────
  function applyDarkMode(dark) {
    darkMode = dark;
    document.body.classList.toggle("dark", dark);
    document.querySelectorAll(".stop-label, .terminal-label, .hub-label").forEach(el => {
      el.setAttribute("fill", dark ? "#e0e0e0" : "#1a1a1a");
    });
    document.getElementById("btn-dark").textContent = dark ? "☀️" : "🌙";
  }

  // ── LABELS TOGGLE ─────────────────────────────────────────────────────────
  function toggleLabels() {
    labelsVisible = !labelsVisible;
    document.getElementById("g-labels").style.display = labelsVisible ? "" : "none";
    document.getElementById("btn-labels").style.opacity = labelsVisible ? "1" : "0.4";
  }

  // ── STATUS CHECK ──────────────────────────────────────────────────────────
  async function checkStatus() {
    try {
      const r = await fetch("/api/health");
      const d = await r.json();
      const bar = document.getElementById("status-bar");
      bar.style.display = d.gtfs_loaded ? "none" : "block";
    } catch(e) {}
  }

  // ── INIT ───────────────────────────────────────────────────────────────────
  async function init() {
    buildLineBadges();
    buildSchematic();
    initPanZoom();

    document.getElementById("dep-close").addEventListener("click", () => {
      document.getElementById("dep-panel").classList.remove("open");
    });
    document.getElementById("btn-dark").addEventListener("click", () => applyDarkMode(!darkMode));
    document.getElementById("btn-labels").addEventListener("click", toggleLabels);

    // Respect existing dark mode preference
    if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
      applyDarkMode(true);
    }

    await loadStops();
    await checkStatus();
    await fetchVehicles();

    // Poll vehicles every RT_POLL_SECONDS
    setInterval(fetchVehicles, Math.max(RT_POLL_MS, 30000));
    setInterval(checkStatus, 30000);
  }

  document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
