<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Stadstrafiken Örebro – LTlive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0d1117; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: #161b22; border-bottom: 1px solid #30363d;
      display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100;
    }
    #header a { color: #8b949e; text-decoration: none; font-size: 13px; white-space: nowrap; }
    #header a:hover { color: #e0e0e0; }
    #header h1 { font-size: 15px; font-weight: 700; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .line-badges { display: flex; gap: 4px; flex-shrink: 0; }
    .line-badge {
      width: 22px; height: 22px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff; cursor: pointer;
      transition: opacity .15s; border: none; outline: none;
    }
    .line-badge.faded { opacity: .25; }
    #vehicle-counts { display: flex; gap: 5px; font-size: 11px; color: #8b949e; flex-shrink: 0; }
    .vc-item { display: flex; align-items: center; gap: 2px; }
    .vc-dot { width: 7px; height: 7px; border-radius: 50%; }
    #toolbar { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    #toolbar button {
      background: #21262d; border: 1px solid #30363d;
      color: #e0e0e0; padding: 4px 10px; border-radius: 6px;
      font-size: 12px; cursor: pointer;
    }
    #toolbar button:hover { background: #30363d; }

    #map-wrapper {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      overflow: hidden; touch-action: none; background: #0d1117;
    }
    #main-svg {
      width: 100%; height: 100%; display: block; cursor: grab; user-select: none;
    }
    #main-svg:active { cursor: grabbing; }

    .stop-hit { cursor: pointer; }
    .stop-hit:hover circle { fill: rgba(255,255,255,.25); }
    .vehicle-marker { pointer-events: none; }

    #dep-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #161b22; box-shadow: 0 -4px 32px rgba(0,0,0,.6);
      border-radius: 16px 16px 0 0; padding: 0;
      transform: translateY(100%); transition: transform .3s ease;
      z-index: 200; max-height: 65vh; display: flex; flex-direction: column;
    }
    #dep-panel.open { transform: translateY(0); }
    #dep-handle { width: 40px; height: 4px; background: #30363d; border-radius: 2px; margin: 10px auto 0; }
    #dep-header { display: flex; align-items: center; padding: 12px 20px 8px; gap: 10px; flex-shrink: 0; }
    #dep-stop-name { font-size: 17px; font-weight: 700; flex: 1; }
    #dep-close {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: #21262d; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center; color: #e0e0e0;
    }
    #dep-lines { display: flex; gap: 6px; padding: 0 20px 10px; flex-wrap: wrap; }
    .dep-line-badge { padding: 2px 9px; border-radius: 12px; font-size: 12px; font-weight: 700; color: #fff; }
    #dep-content { overflow-y: auto; flex: 1; }
    .dep-direction { padding: 8px 20px 4px; border-top: 1px solid #21262d; }
    .dep-direction-label { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .dep-row { display: flex; align-items: center; padding: 7px 0; gap: 12px; border-bottom: 1px solid #21262d; }
    .dep-row:last-child { border-bottom: none; }
    .dep-line { min-width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
    .dep-dest { flex: 1; font-size: 14px; }
    .dep-time { font-size: 18px; font-weight: 700; }
    .dep-time.realtime { color: #3fb950; }
    .dep-time.soon { color: #f78166; }
    .no-deps, .loading-deps { padding: 20px; text-align: center; color: #8b949e; font-size: 14px; }

    #loading-overlay {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0d1117; z-index: 90; font-size: 14px; color: #8b949e;
    }
    #last-update { position: fixed; bottom: 8px; right: 12px; font-size: 11px; color: #30363d; z-index: 50; pointer-events: none; }
    #err-bar {
      position: fixed; top: 52px; left: 50%; transform: translateX(-50%);
      background: #b62324; color: #fff; padding: 4px 14px; border-radius: 0 0 8px 8px;
      font-size: 12px; z-index: 150; display: none;
    }
  </style>

    [2115.7,2603.3],[2142.1,2653.3],[2174.1,2380.6],[2174.1,2424.7],[2174.1,2473.9],

  // Rough affine transform: SVG(x,y) ↔ geographic(lat,lon)
  // Calibrated from 2 known terminals (Brickebacken and Vivalla).
  // Used ONLY for direction detection and stop→GTFS matching.
  const GEO_A = 17429, GEO_B = -263861;   // lon = (svgX - GEO_B) / GEO_A
  const GEO_C = -25113, GEO_D = 1490955;  // lat = (svgY - GEO_D) / GEO_C
  function svgToLonLat(svgX, svgY) {
    return {
      lon: (svgX - GEO_B) / GEO_A,
      lat: (svgY - GEO_D) / GEO_C,
    };
  }
  function lonLatToSvg(lat, lon) {
    return {
      x: GEO_A * lon + GEO_B,
      y: GEO_C * lat + GEO_D,
    };
  }

  // ── STATE ──────────────────────────────────────────────────────────────────
  let canonicalShapes = {};    // lineNum → [[lat,lon],...]
  let canonicalDists  = {};    // lineNum → cumulative distances
  let shapeIsForward  = {};    // lineNum → bool (GTFS shape direction vs SVG path)
  let svgPathDists    = {};    // lineNum → cumulative SVG distances
  let gtfsStops       = [];    // [{stop_id, stop_name, stop_lat, stop_lon}]
  let svgCircleStops  = [];    // [{cx, cy, stop_id, stop_name}] matched SVG circles
  let labelsVisible   = false;
  let hiddenLines     = new Set();
  let svgPan = { x:0, y:0, scale:1, dragging:false, sx:0, sy:0, px:0, py:0 };
  const RT_POLL_MS = (window.__RT_POLL_SECONDS || 30) * 1000;

  // ── SVG HELPERS ────────────────────────────────────────────────────────────
  const NS = "http://www.w3.org/2000/svg";
  function el(tag, attrs = {}, parent = null) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    if (parent) parent.appendChild(e);
    return e;
  }

  // ── GEOMETRY HELPERS ───────────────────────────────────────────────────────
  function buildCumDist(pts) {
    const d = [0];
    for (let i = 1; i < pts.length; i++) {
      const dx = pts[i][0] - pts[i-1][0], dy = pts[i][1] - pts[i-1][1];
      d.push(d[d.length-1] + Math.sqrt(dx*dx + dy*dy));
    }
    return d;
  }
  function buildCumDistGeo(pts) {
    const d = [0];
    for (let i = 1; i < pts.length; i++) {
      const dlat = pts[i][0] - pts[i-1][0], dlon = pts[i][1] - pts[i-1][1];
      // Use simple Euclidean (degrees) — fine for fraction computation
      d.push(d[d.length-1] + Math.sqrt(dlat*dlat + dlon*dlon));
    }
    return d;
  }
  function getPosAtFraction(pts, cumDist, f) {
    const total = cumDist[cumDist.length-1];
    if (total === 0) return {x: pts[0][0], y: pts[0][1]};
    const target = Math.max(0, Math.min(1, f)) * total;
    let lo = 0, hi = pts.length - 1;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (cumDist[mid] <= target) lo = mid; else hi = mid;
    }
    const segLen = cumDist[hi] - cumDist[lo];
    const t = segLen > 0 ? (target - cumDist[lo]) / segLen : 0;
    return {
      x: pts[lo][0] + t * (pts[hi][0] - pts[lo][0]),
      y: pts[lo][1] + t * (pts[hi][1] - pts[lo][1]),
    };
  }

  // Project a lat/lon point onto a GTFS shape polyline.
  // Returns {f: fraction_along_shape, dist: min_distance_in_degrees}
  function projectOntoShape(lat, lon, shapePts, cumDistGeo) {
    const total = cumDistGeo[cumDistGeo.length - 1];
    if (total === 0) return {f: 0, dist: Infinity};
    let bestF = 0, bestDist = Infinity, cumD = 0;
    for (let i = 0; i < shapePts.length - 1; i++) {
      const ax = shapePts[i][1], ay = shapePts[i][0];
      const bx = shapePts[i+1][1], by = shapePts[i+1][0];
      const abx = bx-ax, aby = by-ay, len2 = abx*abx + aby*aby;
      let t = len2 > 0 ? ((lon-ax)*abx + (lat-ay)*aby) / len2 : 0;
      t = t < 0 ? 0 : t > 1 ? 1 : t;
      const cx = ax+t*abx, cy = ay+t*aby;
      const d = Math.sqrt((lon-cx)*(lon-cx)+(lat-cy)*(lat-cy));
      if (d < bestDist) {
        bestDist = d;
        const segLen = cumDistGeo[i+1] - cumDistGeo[i];
        bestF = (cumD + t * segLen) / total;
      }
      cumD += cumDistGeo[i+1] - cumDistGeo[i];
    }
    return {f: bestF, dist: bestDist};
  }

  // Determine if a GTFS shape runs in the same direction as the SVG path.
  // Compare shape's start geographic position to both SVG path endpoints.
  function isShapeForward(lineNum, shapePts) {
    const svgPath = SVG_LINE_PATHS[lineNum];
    const svgStart = svgPath[0], svgEnd = svgPath[svgPath.length - 1];
    // Project shape start to approximate SVG coords
    const {x: px, y: py} = lonLatToSvg(shapePts[0][0], shapePts[0][1]);
    const dStart = (px-svgStart[0])**2 + (py-svgStart[1])**2;
    const dEnd   = (px-svgEnd[0])**2   + (py-svgEnd[1])**2;
    return dStart <= dEnd; // forward if shape start is closer to SVG start
  }

  // Get SVG position for a vehicle/stop on a given line at geographic (lat,lon).
  function getSvgPosForLatLon(lineNum, lat, lon) {
    const shape = canonicalShapes[lineNum];
    const cumDist = canonicalDists[lineNum];
    if (!shape || !cumDist) return null;
    const {f, dist} = projectOntoShape(lat, lon, shape, cumDist);
    if (dist > 0.02) return null; // too far from route (~2km)
    const finalF = shapeIsForward[lineNum] ? f : (1 - f);
    const svgPath = SVG_LINE_PATHS[lineNum];
    return getPosAtFraction(svgPath, svgPathDists[lineNum], finalF);
  }

  // ── INITIALIZATION ─────────────────────────────────────────────────────────
  async function loadAndBuild() {
    // 1. Get routes for city lines 1-7
    let routesData;
    try {
      routesData = await fetch("/api/routes/all").then(r => r.json());
    } catch (e) {
      showErr("Kunde inte hämta linjedata");
      return;
    }

    const cityRoutes = routesData.routes.filter(r => CITY_LINES.includes(r.route_short_name));
    if (!cityRoutes.length) {
      document.getElementById("loading-overlay").textContent = "Inga stadstrafik-linjer hittades.";
      return;
    }

    // Group route_ids by line short name
    const byName = {};
    for (const r of cityRoutes) {
      if (!byName[r.route_short_name]) byName[r.route_short_name] = [];
      byName[r.route_short_name].push(r.route_id);
    }

    // 2. Precompute SVG path distances
    for (const [line, pts] of Object.entries(SVG_LINE_PATHS)) {
      svgPathDists[line] = buildCumDist(pts);
    }

    // 3. Fetch shapes and stops in parallel
    const allRouteIds = cityRoutes.map(r => r.route_id).join(",");
    const [stopResult] = await Promise.all([
      fetch(`/api/stops?route_ids=${allRouteIds}`).then(r => r.json()),
      ...Object.entries(byName).map(async ([lineNum, routeIds]) => {
        const allShapes = {};
        await Promise.all(routeIds.map(async rid => {
          try {
            const d = await fetch(`/api/shapes/${rid}`).then(r => r.json());
            Object.assign(allShapes, d.shapes || {});
          } catch {}
        }));
        // Pick the longest shape for this line
        let longest = null, longestLen = 0;
        for (const pts of Object.values(allShapes)) {
          if (pts.length > longestLen) { longest = pts; longestLen = pts.length; }
        }
        if (longest && longest.length > 1) {
          canonicalShapes[lineNum] = longest;
          canonicalDists[lineNum] = buildCumDistGeo(longest);
          shapeIsForward[lineNum] = isShapeForward(lineNum, longest);
        }
      }),
    ]);

    gtfsStops = (stopResult.stops || []).filter(s => s.stop_lat && s.stop_lon && s.location_type === 0);

    // 4. Match SVG circles to GTFS stops
    matchCirclesToStops();

    // 5. Render stops
    renderStops();

    // 6. Build line badges
    buildLineBadges(byName);

    // 7. Hide loading, start vehicle polling
    document.getElementById("loading-overlay").style.display = "none";
    await fetchVehicles();
    setInterval(fetchVehicles, RT_POLL_MS);
  }

  // Project an SVG (x,y) point onto an SVG polyline path.
  // Returns {f: fraction_along_path, dist: min_distance_in_SVG_units}
  function projectSvgPointOntoPath(cx, cy, pts, cumDist) {
    const total = cumDist[cumDist.length - 1];
    if (total === 0) return {f: 0, dist: Infinity};
    let bestF = 0, bestDist = Infinity, cumD = 0;
    for (let i = 0; i < pts.length - 1; i++) {
      const ax = pts[i][0], ay = pts[i][1];
      const bx = pts[i+1][0], by = pts[i+1][1];
      const abx = bx-ax, aby = by-ay, len2 = abx*abx + aby*aby;
      let t = len2 > 0 ? ((cx-ax)*abx + (cy-ay)*aby) / len2 : 0;
      t = t < 0 ? 0 : t > 1 ? 1 : t;
      const nearX = ax+t*abx, nearY = ay+t*aby;
      const d = Math.sqrt((cx-nearX)**2 + (cy-nearY)**2);
      if (d < bestDist) {
        bestDist = d;
        const segLen = cumDist[i+1] - cumDist[i];
        bestF = (cumD + t * segLen) / total;
      }
      cumD += cumDist[i+1] - cumDist[i];
    }
    return {f: bestF, dist: bestDist};
  }

  // Match each SVG stop circle to the nearest GTFS stop using route-fraction mapping.
  // For each SVG circle:
  //   1. Find nearest SVG line path (in SVG space) → fraction f_svg
  //   2. Map f_svg → geographic position via canonical GTFS shape
  //   3. Find nearest GTFS stop to that geographic position
  function matchCirclesToStops() {
    svgCircleStops = [];
    for (const [cx, cy] of SVG_STOP_CIRCLES) {
      // 1. Find nearest line path in SVG space
      let bestLine = null, bestF = 0, bestSvgDist = Infinity;
      for (const [lineNum, svgPath] of Object.entries(SVG_LINE_PATHS)) {
        if (!canonicalShapes[lineNum]) continue;
        const {f, dist} = projectSvgPointOntoPath(cx, cy, svgPath, svgPathDists[lineNum]);
        if (dist < bestSvgDist) {
          bestSvgDist = dist;
          bestLine = lineNum;
          bestF = f;
        }
      }
      if (!bestLine || bestSvgDist > 120) continue; // >120 SVG units from any route

      // 2. Convert SVG fraction → GTFS geographic position
      const f_gtfs = shapeIsForward[bestLine] ? bestF : (1 - bestF);
      const shape = canonicalShapes[bestLine];
      const geoPos = getPosAtFraction(shape, canonicalDists[bestLine], f_gtfs);
      // geoPos.x = lat, geoPos.y = lon (GTFS shapes are [lat, lon] pairs)

      // 3. Find nearest GTFS stop to that geographic position
      let bestStop = null, bestStopDist = Infinity;
      for (const s of gtfsStops) {
        const d = Math.sqrt((s.stop_lat - geoPos.x)**2 + (s.stop_lon - geoPos.y)**2);
        if (d < bestStopDist) { bestStopDist = d; bestStop = s; }
      }
      if (bestStop && bestStopDist < 0.005) { // ~500m max
        svgCircleStops.push({cx, cy, stop_id: bestStop.stop_id, stop_name: bestStop.stop_name});
      }
    }
  }

  // Render clickable stop circles in the overlay SVG.
  function renderStops() {
    const gStops = document.getElementById("g-stops");
    const gLabels = document.getElementById("g-labels");
    gStops.innerHTML = "";
    gLabels.innerHTML = "";

    const rendered = new Set();
    for (const sc of svgCircleStops) {
      const key = `${Math.round(sc.cx)},${Math.round(sc.cy)}`;
      if (rendered.has(key)) continue;
      rendered.add(key);

      const g = el("g", {class: "stop-hit"}, gStops);
      g.addEventListener("click", (e) => { e.stopPropagation(); onStopClick(sc); });
      // Hit area (invisible circle)
      el("circle", {cx: sc.cx, cy: sc.cy, r: 22, fill: "transparent"}, g);

      // Label
      el("text", {
        x: sc.cx + 14, y: sc.cy + 5,
        "font-size": "18", fill: "#e0e0e0",
        "font-family": "sans-serif", "pointer-events": "none",
        stroke: "#0d1117", "stroke-width": "4", "stroke-linejoin": "round",
        "paint-order": "stroke",
      }, gLabels).textContent = sc.stop_name;
    }
  }

  // ── VEHICLES ───────────────────────────────────────────────────────────────
  async function fetchVehicles() {
    try {
      const data = await fetch("/api/vehicles").then(r => r.json());
      renderVehicles(data.vehicles || []);
      updateVehicleCounts(data.vehicles || []);
      document.getElementById("last-update").textContent =
        "Uppdaterad " + new Date().toLocaleTimeString("sv-SE");
    } catch (e) { console.warn("Vehicle fetch failed:", e); }
  }

  function renderVehicles(vehicles) {
    const g = document.getElementById("g-vehicles");
    g.innerHTML = "";
    for (const v of vehicles) {
      const ln = v.route_short_name;
      if (!ln || !LINE_COLORS[ln]) continue;
      if (hiddenLines.has(ln)) continue;
      if (!v.lat || !v.lon) continue;

      // Get SVG position via route-fraction
      const pos = getSvgPosForLatLon(ln, v.lat, v.lon);
      if (!pos) continue;

      const { bg, fg } = LINE_COLORS[ln];
      const vg = el("g", {
        transform: `translate(${pos.x.toFixed(1)},${pos.y.toFixed(1)})`,
        class: "vehicle-marker",
      }, g);
      el("circle", {cx: 0, cy: 0, r: 28, fill: bg, filter: "url(#shadow)"}, vg);
      el("circle", {cx: 0, cy: 0, r: 28, fill: bg, stroke: "#fff", "stroke-width": 5}, vg);
      el("text", {
        x: 0, y: 10, "text-anchor": "middle",
        "font-size": "26", "font-weight": "800", fill: fg,
        "font-family": "sans-serif",
      }, vg).textContent = ln;

      // Tooltip
      const title = document.createElementNS(NS, "title");
      title.textContent = `Linje ${ln}${v.trip_headsign ? " → " + v.trip_headsign : ""}`;
      vg.appendChild(title);
    }
  }

  function updateVehicleCounts(vehicles) {
    const byLine = {};
    for (const v of vehicles) {
      const ln = v.route_short_name;
      if (!ln || !LINE_COLORS[ln]) continue;
      byLine[ln] = (byLine[ln] || 0) + 1;
    }
    const vcEl = document.getElementById("vehicle-counts");
    vcEl.innerHTML = CITY_LINES.filter(l => byLine[l])
      .map(l => `<span class="vc-item"><span class="vc-dot" style="background:${LINE_COLORS[l].bg}"></span>${byLine[l]}</span>`)
      .join("");
  }

  // ── STOP CLICK & DEPARTURES ────────────────────────────────────────────────
  function onStopClick(sc) {
    const panel = document.getElementById("dep-panel");
    document.getElementById("dep-stop-name").textContent = sc.stop_name;
    document.getElementById("dep-lines").innerHTML = "";
    document.getElementById("dep-content").innerHTML = '<div class="loading-deps">Hämtar avgångar…</div>';
    panel.classList.add("open");
    loadDepartures(sc.stop_id);
  }

  async function loadDepartures(stopId) {
    const contentEl = document.getElementById("dep-content");
    const linesEl = document.getElementById("dep-lines");
    try {
      const data = await fetch(`/api/departures/${stopId}`).then(r => r.json());
      const deps = data.departures || [];
      if (!deps.length) {
        contentEl.innerHTML = '<div class="no-deps">Inga avgångar hittades just nu.</div>';
        return;
      }
      // Group by direction/headsign
      const grouped = {};
      for (const d of deps) {
        const key = d.trip_headsign || d.route_long_name || "Okänd";
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(d);
      }
      // Unique lines
      const lineSet = new Set(deps.map(d => d.route_short_name).filter(Boolean));
      linesEl.innerHTML = [...lineSet].sort().map(l => {
        const c = LINE_COLORS[l] || {bg:"#555"};
        return `<span class="dep-line-badge" style="background:${c.bg}">${l}</span>`;
      }).join("");

      contentEl.innerHTML = "";
      for (const [dest, list] of Object.entries(grouped)) {
        const sec = document.createElement("div");
        sec.className = "dep-direction";
        sec.innerHTML = `<div class="dep-direction-label">${dest}</div>`;
        for (const dep of list.slice(0, 5)) {
          const row = document.createElement("div");
          row.className = "dep-row";
          const col = (LINE_COLORS[dep.route_short_name] || {bg:"#555"}).bg;
          const mins = dep.minutes_until !== undefined ? dep.minutes_until : "–";
          let timeClass = "dep-time";
          if (typeof dep.minutes_until === "number") {
            if (dep.minutes_until <= 2) timeClass += " soon";
            else if (dep.realtime) timeClass += " realtime";
          }
          row.innerHTML = `
            <div class="dep-line" style="background:${col}">${dep.route_short_name || "?"}</div>
            <div class="dep-dest">${dep.trip_headsign || dep.stop_headsign || "–"}</div>
            <div class="${timeClass}">${mins === 0 ? "Nu" : mins + " min"}</div>`;
          sec.appendChild(row);
        }
        contentEl.appendChild(sec);
      }
    } catch (e) {
      contentEl.innerHTML = '<div class="no-deps">Fel vid hämtning av avgångar.</div>';
    }
  }

  // ── LINE BADGES ────────────────────────────────────────────────────────────
  function buildLineBadges(byName) {
    const container = document.getElementById("line-badges");
    container.innerHTML = "";
    for (const ln of CITY_LINES) {
      if (!byName[ln]) continue;
      const {bg, fg} = LINE_COLORS[ln];
      const btn = document.createElement("button");
      btn.className = "line-badge";
      btn.style.background = bg;
      btn.textContent = ln;
      btn.title = `Linje ${ln} – klicka för att dölja`;
      btn.addEventListener("click", () => {
        if (hiddenLines.has(ln)) { hiddenLines.delete(ln); btn.classList.remove("faded"); }
        else { hiddenLines.add(ln); btn.classList.add("faded"); }
        fetchVehicles(); // Re-render (quick redraw from cache)
      });
      container.appendChild(btn);
    }
  }

  // ── PAN / ZOOM ─────────────────────────────────────────────────────────────
  const svg = document.getElementById("main-svg");
  const gPan = document.getElementById("g-pan");

  function applyTransform() {
    gPan.setAttribute("transform",
      `translate(${svgPan.x},${svgPan.y}) scale(${svgPan.scale})`);
  }

  // Mouse/touch handling
  svg.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    svgPan.dragging = true;
    svgPan.sx = e.clientX; svgPan.sy = e.clientY;
    svgPan.px = svgPan.x; svgPan.py = svgPan.y;
  });
  window.addEventListener("mousemove", (e) => {
    if (!svgPan.dragging) return;
    svgPan.x = svgPan.px + (e.clientX - svgPan.sx);
    svgPan.y = svgPan.py + (e.clientY - svgPan.sy);
    applyTransform();
  });
  window.addEventListener("mouseup", () => { svgPan.dragging = false; });

  svg.addEventListener("wheel", (e) => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    // Zoom toward cursor
    const vb = [0, 0, 2481, 3508];
    const scaleW = rect.width / vb[2], scaleH = rect.height / vb[3];
    const displayScale = Math.min(scaleW, scaleH);
    const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
    const newScale = Math.max(0.3, Math.min(20, svgPan.scale * factor));
    // Adjust pan so zoom is centered on cursor
    const ratio = newScale / svgPan.scale;
    svgPan.x = mx - ratio * (mx - svgPan.x);
    svgPan.y = my - ratio * (my - svgPan.y);
    svgPan.scale = newScale;
    applyTransform();
  }, {passive: false});

  // Touch (pinch zoom + pan)
  let touches = {};
  svg.addEventListener("touchstart", (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) touches[t.identifier] = {x: t.clientX, y: t.clientY};
    const ids = Object.keys(touches);
    if (ids.length === 1) {
      svgPan.dragging = true;
      const t = touches[ids[0]];
      svgPan.sx = t.x; svgPan.sy = t.y;
      svgPan.px = svgPan.x; svgPan.py = svgPan.y;
    }
  }, {passive: false});
  svg.addEventListener("touchmove", (e) => {
    e.preventDefault();
    const prev = {};
    for (const id of Object.keys(touches)) prev[id] = {...touches[id]};
    for (const t of e.changedTouches) touches[t.identifier] = {x: t.clientX, y: t.clientY};
    const ids = Object.keys(touches);
    if (ids.length === 1 && svgPan.dragging) {
      const t = touches[ids[0]];
      svgPan.x = svgPan.px + (t.x - svgPan.sx);
      svgPan.y = svgPan.py + (t.y - svgPan.sy);
      applyTransform();
    } else if (ids.length === 2) {
      const [id0, id1] = ids;
      const p0 = prev[id0]||touches[id0], p1 = prev[id1]||touches[id1];
      const c0 = touches[id0], c1 = touches[id1];
      const prevDist = Math.hypot(p1.x-p0.x, p1.y-p0.y);
      const curDist  = Math.hypot(c1.x-c0.x, c1.y-c0.y);
      if (prevDist > 0) {
        const factor = curDist / prevDist;
        const midX = (c0.x + c1.x) / 2, midY = (c0.y + c1.y) / 2;
        const newScale = Math.max(0.3, Math.min(20, svgPan.scale * factor));
        const ratio = newScale / svgPan.scale;
        svgPan.x = midX - ratio * (midX - svgPan.x);
        svgPan.y = midY - ratio * (midY - svgPan.y);
        svgPan.scale = newScale;
        applyTransform();
      }
    }
  }, {passive: false});
  svg.addEventListener("touchend", (e) => {
    for (const t of e.changedTouches) delete touches[t.identifier];
    if (Object.keys(touches).length === 0) svgPan.dragging = false;
  }, {passive: false});

  // ── LABEL TOGGLE ───────────────────────────────────────────────────────────
  document.getElementById("btn-labels").addEventListener("click", () => {
    labelsVisible = !labelsVisible;
    document.getElementById("g-labels").style.display = labelsVisible ? "" : "none";
    document.getElementById("btn-labels").textContent = labelsVisible ? "Dölj namn" : "Etiketter";
  });

  // ── DEP PANEL CLOSE ────────────────────────────────────────────────────────
  document.getElementById("dep-close").addEventListener("click", () => {
    document.getElementById("dep-panel").classList.remove("open");
  });
  // Close on background click (not on panel)
  document.getElementById("dep-panel").addEventListener("click", e => e.stopPropagation());
  svg.addEventListener("click", () => {
    if (document.getElementById("dep-panel").classList.contains("open")) {
      document.getElementById("dep-panel").classList.remove("open");
    }
  });

  // ── ERROR BAR ──────────────────────────────────────────────────────────────
  function showErr(msg) {
    const bar = document.getElementById("err-bar");
    bar.textContent = msg;
    bar.style.display = "block";
    setTimeout(() => bar.style.display = "none", 4000);
  }

  // ── START ─────────────────────────────────────────────────────────────────
  loadAndBuild();
  </script>
</body>
