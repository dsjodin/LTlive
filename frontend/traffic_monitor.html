<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTlive – Trafikinferens monitor</title>
  <link rel="stylesheet" href="diag.css" />
  <style>
    .sev-badge {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
    }
    .sev-none   { background:#333; color:#888; }
    .sev-low    { background:#3a3200; color:#FFD600; }
    .sev-medium { background:#3a2000; color:#FF9800; }
    .sev-high   { background:#3a0800; color:#F44336; }

    .zone-tag {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; margin-right: 2px;
    }
    .zone-stop     { background:#1a3a5a; color:#7eb8f7; }
    .zone-signal   { background:#3a3a1a; color:#f0e060; }
    .zone-terminal { background:#3a1a3a; color:#e070e0; }

    .bar-wrap { background:#1a1d27; border-radius:3px; height:6px; min-width:60px; overflow:hidden; }
    .bar-fill  { height:100%; border-radius:3px; transition:width 0.3s; }

    .conf-ring {
      display:inline-block; width:32px; height:32px; border-radius:50%;
      border:3px solid #2a2d3d; text-align:center; line-height:26px;
      font-size:11px; font-weight:700;
    }

    .obs-pill {
      display:inline-block; background:#22263a; border:1px solid #2e3250;
      border-radius:10px; padding:1px 8px; font-size:11px; color:#bbc;
    }

    #hour-grid {
      display: grid;
      grid-template-columns: auto repeat(24, 1fr);
      gap: 2px;
      font-size: 10px;
    }
    .hg-label { color:#778; padding:2px 4px; text-align:right; white-space:nowrap; }
    .hg-cell  {
      border-radius:2px; height:16px;
      background:#1a1d27;
      border:1px solid #2a2d3d;
    }
    .hg-cell.has-data { background:#1b4d2e; border-color:#2a7a46; }

    .veh-chip {
      display:inline-flex; align-items:center; gap:5px;
      background:#1e2236; border-radius:4px; padding:3px 8px;
      font-size:11px; font-family:monospace;
    }
    .veh-chip .age { color:#667; }
    .veh-chip .age.stale { color:#f05050; }
    #vehicles-grid { display:flex; flex-wrap:wrap; gap:5px; }
  </style>
</head>
<body>
<div id="topbar">
  <h1>LTlive <span>Trafikinferens</span></h1>
  <a href="/" id="main-link">← Kartan</a>
  <a href="/diag.html" class="api-link">Diagnostik</a>
  <div class="sep"></div>
  <span id="clock"></span>
  <span id="auto-badge">auto 5s</span>
  <button id="refresh-btn">⟳ Uppdatera</button>
</div>

<div id="page">
  <div id="loading"><span class="spin">⟳</span> Laddar data…</div>
</div>

<script type="module" src="traffic_monitor.js"></script>
</body>
</html>
