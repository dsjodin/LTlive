<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTlive - Bussar och tåg i Örebro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== Top bar ===== -->
    <header id="topbar">
        <div id="topbar-main">
            <div class="topbar-brand">
                <span class="brand-name">LTlive</span>
                <span class="brand-sub">Örebro</span>
            </div>

            <div class="topbar-controls" id="topbar-controls">
                <label class="ctrl-pill" for="toggle-stops" title="Visa hållplatser">
                    <input type="checkbox" id="toggle-stops" checked />
                    <span>Hållplatser</span>
                </label>
                <label class="ctrl-pill" for="toggle-routes" title="Visa linjesträckningar">
                    <input type="checkbox" id="toggle-routes" checked />
                    <span>Linjer</span>
                </label>
                <label class="ctrl-pill" for="toggle-labels" title="Visa linjenummer">
                    <input type="checkbox" id="toggle-labels" checked />
                    <span>Nummer</span>
                </label>
<label class="ctrl-pill" for="toggle-darkmode" title="Mörkt tema">
                    <input type="checkbox" id="toggle-darkmode" />
                    <span>Mörkt</span>
                </label>
                <button id="type-btn-bus" class="type-btn" title="Visa/dölj bussar">Bussar</button>
                <button id="type-btn-train" class="type-btn" title="Visa/dölj tåg">Tåg</button>
                <button id="fav-panel-btn" class="type-btn" title="Favorithållplatser">★ Favoriter</button>
                <button id="delays-btn" class="type-btn" title="Visa mest försenade bussar">Förseningar</button>
                <button id="dashboard-btn" class="type-btn" title="Dashboard">Dashboard</button>
            </div>

            <div class="topbar-stats">
                <div class="topbar-stat">
                    <span class="ts-value" id="vehicle-count">0</span>
                    <span class="ts-label">fordon</span>
                </div>
                <div class="topbar-stat">
                    <span class="ts-value" id="route-count">0</span>
                    <span class="ts-label">linjer</span>
                </div>
                <div class="topbar-stat" id="weather-widget" title="Väder i Örebro">
                    <span class="ts-value" id="weather-temp">--°</span>
                    <span class="ts-label" id="weather-icon">☁</span>
                </div>
                <div class="topbar-stat wide">
                    <span class="ts-value" id="last-update">--:--:--</span>
                    <span class="ts-label">uppdaterad</span>
                </div>
            </div>


            <button id="hamburger-btn" aria-label="Inställningar" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>

        <!-- Line filter row -->
        <div id="topbar-lines">
            <div id="line-buttons"></div>
        </div>
    </header>

    <!-- ===== Map ===== -->
    <div id="map"></div>

    <!-- GPS locate button -->
    <button id="gps-btn" title="Visa min position">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            <circle cx="12" cy="12" r="8" stroke-opacity="0.35"/>
        </svg>
    </button>

    <!-- ===== Line departure panel ===== -->
    <div id="line-panel">
        <div id="line-panel-header">
            <div id="line-panel-title"></div>
            <button id="line-panel-close" aria-label="Stäng">&#x2715;</button>
        </div>
        <div id="line-panel-body">
            <div id="line-panel-content"></div>
        </div>
    </div>

    <!-- ===== Nearby stops panel ===== -->
    <div id="nearby-panel">
        <div id="nearby-panel-header">
            <div id="nearby-panel-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
                <span>Hållplatser nära dig</span>
            </div>
            <button id="nearby-panel-close" aria-label="Stäng">&#x2715;</button>
        </div>
        <div id="nearby-panel-body"></div>
    </div>

    <!-- ===== Dashboard panel ===== -->
    <div id="dashboard-panel">
        <div id="dashboard-panel-header">
            <div id="dashboard-panel-title">Dashboard</div>
            <button id="dashboard-panel-close" aria-label="Stäng">&#x2715;</button>
        </div>
        <div id="dashboard-panel-body">
            <div class="dash-grid">
                <div class="dash-card">
                    <span class="dash-value" id="dash-buses">—</span>
                    <span class="dash-label">Bussar</span>
                </div>
                <div class="dash-card">
                    <span class="dash-value" id="dash-trains">—</span>
                    <span class="dash-label">Tåg</span>
                </div>
                <div class="dash-card">
                    <span class="dash-value" id="dash-routes">—</span>
                    <span class="dash-label">Linjer</span>
                </div>
                <div class="dash-card" id="dash-alerts-card">
                    <span class="dash-value" id="dash-alerts">—</span>
                    <span class="dash-label">Störningar</span>
                </div>
            </div>
            <div id="dash-alerts-list"></div>
            <div id="dash-favorites-section">
                <div class="dash-section-title">★ Favorithållplatser</div>
                <div id="dash-favorites-body"></div>
            </div>
        </div>
    </div>

    <!-- ===== Delays overlay ===== -->
    <div id="delays-overlay">
        <div id="delays-panel">
            <div id="delays-panel-header">
                <div id="delays-panel-title">🔴 Förseningar just nu</div>
                <button id="delays-panel-close" aria-label="Stäng">&#x2715;</button>
            </div>
            <div id="delays-panel-body">
                <table id="delays-table">
                    <thead>
                        <tr>
                            <th>Linje</th>
                            <th>Mot</th>
                            <th>Försening</th>
                            <th>Nästa hållplats</th>
                        </tr>
                    </thead>
                    <tbody id="delays-tbody"></tbody>
                </table>
                <div id="delays-empty" style="display:none">Inga förseningar registrerade just nu.</div>
            </div>
        </div>
    </div>

    <!-- ===== Favorites panel ===== -->
    <div id="favorites-panel">
        <div id="favorites-panel-header">
            <div id="favorites-panel-title">★ Favorithållplatser</div>
            <button id="favorites-panel-close" aria-label="Stäng">&#x2715;</button>
        </div>
        <div id="favorites-panel-body"></div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="config.js"></script>
    <script type="module" src="app.js"></script>
    <script src="analytics.js"></script>
</body>
</html>
