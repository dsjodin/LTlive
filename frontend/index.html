<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTlive - Bussar i Örebro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== Top bar ===== -->
    <header id="topbar">
        <div id="topbar-main">
            <div class="topbar-brand">
                <span class="brand-name">LTlive</span>
                <span class="brand-sub">Örebro</span>
            </div>

            <div class="topbar-controls">
                <label class="ctrl-pill" for="toggle-stops" title="Visa hållplatser">
                    <input type="checkbox" id="toggle-stops" />
                    <span>Hållplatser</span>
                </label>
                <label class="ctrl-pill" for="toggle-routes" title="Visa linjesträckningar">
                    <input type="checkbox" id="toggle-routes" />
                    <span>Linjer</span>
                </label>
                <label class="ctrl-pill" for="toggle-labels" title="Visa linjenummer">
                    <input type="checkbox" id="toggle-labels" checked />
                    <span>Nummer</span>
                </label>
                <label class="ctrl-pill" for="toggle-darkmode" title="Mörkt tema">
                    <input type="checkbox" id="toggle-darkmode" checked />
                    <span>Mörkt</span>
                </label>
            </div>

            <div class="topbar-stats">
                <div class="topbar-stat">
                    <span class="ts-value" id="vehicle-count">0</span>
                    <span class="ts-label">fordon</span>
                </div>
                <div class="topbar-stat">
                    <span class="ts-value" id="route-count">0</span>
                    <span class="ts-label">linjer</span>
                </div>
                <div class="topbar-stat wide">
                    <span class="ts-value" id="last-update">--:--:--</span>
                    <span class="ts-label">uppdaterad</span>
                </div>
            </div>

            <a href="/stadstrafiken.html" class="topbar-map-btn" title="Stadstrafikskarta">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
                    <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
                </svg>
                Karta
            </a>
        </div>

        <!-- Line filter row -->
        <div id="topbar-lines">
            <div id="line-buttons"></div>
        </div>
    </header>

    <!-- ===== Map ===== -->
    <div id="map"></div>

    <!-- ===== Bottom ticker ===== -->
    <div id="bottom-ticker">
        <span class="ticker-label">TRAFIK</span>
        <div class="ticker-wrap">
            <div class="ticker-move" id="ticker-content">Laddar trafikinformation…</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
