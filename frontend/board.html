<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avgångstavla – LTlive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --bg2: #13131a;
            --border: rgba(255,255,255,0.08);
            --text: #f0f0f0;
            --muted: #6e6e7a;
            --accent: #e8a020;
            --green: #34c759;
            --orange: #ff9f0a;
            --red: #ff3b30;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace, sans-serif;
            overflow: hidden;
        }

        /* Header */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            gap: 16px;
        }

        #stop-title {
            font-size: clamp(1.1rem, 3vw, 1.8rem);
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #stop-subtitle {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 2px;
        }

        #clock {
            font-size: clamp(1.4rem, 4vw, 2.6rem);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
            letter-spacing: 1px;
            flex-shrink: 0;
            font-family: monospace;
        }

        #back-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            flex-shrink: 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s, border-color 0.15s;
        }
        #back-btn:hover { color: var(--text); border-color: var(--accent); }

        /* Stop search / selector */
        #search-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
        }

        #stop-search {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 8px 12px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }
        #stop-search:focus { border-color: var(--accent); }
        #stop-search::placeholder { color: var(--muted); }

        #search-results {
            position: absolute;
            top: 0; left: 0;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 320px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            display: none;
        }
        #search-results.open { display: block; }
        .search-result-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: rgba(255,255,255,0.07); }
        .search-result-dir { display: block; font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

        #search-wrap { position: relative; flex: 1; }

        /* Departure board */
        #board {
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            overflow-y: auto;
            padding: 0;
        }

        #board-wrap {
            position: relative;
            overflow: hidden;
        }

        .dep-row {
            display: grid;
            grid-template-columns: 64px 1fr auto auto;
            align-items: center;
            gap: 0 16px;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .dep-row:hover { background: rgba(255,255,255,0.03); }
        .dep-row.dep-now { background: rgba(52, 199, 89, 0.07); }

        .dep-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: clamp(0.9rem, 2.2vw, 1.2rem);
            letter-spacing: -0.3px;
            min-width: 48px;
            text-align: center;
        }

        .dep-headsign {
            font-size: clamp(0.95rem, 2.4vw, 1.35rem);
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dep-clock {
            font-size: clamp(0.85rem, 1.8vw, 1.1rem);
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            font-family: monospace;
            white-space: nowrap;
        }

        .dep-eta {
            font-size: clamp(1rem, 2.8vw, 1.6rem);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            font-family: monospace;
            text-align: right;
            white-space: nowrap;
            min-width: 110px;
        }
        .dep-eta.eta-now    { color: var(--green); }
        .dep-eta.eta-soon   { color: var(--orange); }
        .dep-eta.eta-normal { color: var(--text); }

        .dep-rt-badge {
            display: inline-block;
            font-size: 0.65rem;
            background: #1a4d2e;
            color: var(--green);
            border-radius: 4px;
            padding: 1px 4px;
            margin-left: 5px;
            vertical-align: middle;
            font-weight: 700;
        }

        /* Empty / loading states */
        .board-msg {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--muted);
            font-size: 1rem;
        }

        /* Refresh indicator */
        #refresh-bar {
            height: 2px;
            background: var(--accent);
            width: 100%;
            transform-origin: left;
            transition: transform 20s linear;
            transform: scaleX(0);
        }
        #refresh-bar.running { transform: scaleX(1); }

        /* Fullscreen hint */
        #fs-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            flex-shrink: 0;
            transition: color 0.15s, border-color 0.15s;
        }
        #fs-btn:hover { color: var(--text); border-color: var(--accent); }
    </style>
</head>
<body>

<div id="header">
    <div>
        <div id="stop-title">Avgångstavla</div>
        <div id="stop-subtitle">LTlive · Välj hållplats nedan</div>
    </div>
    <div id="clock">--:--:--</div>
    <button id="fs-btn" title="Helskärm" onclick="toggleFullscreen()">⛶</button>
    <a id="back-btn" href="/">&#8592; Karta</a>
</div>

<div id="search-bar">
    <div id="search-wrap">
        <input id="stop-search" type="text" placeholder="Sök hållplats…" autocomplete="off" />
        <div id="search-results"></div>
    </div>
</div>

<div id="refresh-bar"></div>

<div id="board-wrap">
    <div id="board">
        <div class="board-msg" id="board-msg">Välj en hållplats för att se avgångar</div>
    </div>
</div>

<script>
const API = "/api";
let currentStopId = null;
let currentStopName = "";
let refreshTimer = null;
let allStops = [];
let etaCountdownTimer = null;

// Clock
function updateClock() {
    document.getElementById("clock").textContent =
        new Date().toLocaleTimeString("sv-SE");
}
setInterval(updateClock, 1000);
updateClock();

// Board height
function resizeBoard() {
    const header = document.getElementById("header").offsetHeight;
    const searchBar = document.getElementById("search-bar").offsetHeight;
    const bar = document.getElementById("refresh-bar").offsetHeight;
    const wrap = document.getElementById("board-wrap");
    wrap.style.position = "absolute";
    wrap.style.top = (header + searchBar + bar) + "px";
    wrap.style.bottom = "0";
    wrap.style.left = "0";
    wrap.style.right = "0";
}
window.addEventListener("resize", resizeBoard);
resizeBoard();

// Read URL params
const params = new URLSearchParams(location.search);
if (params.get("stop_id")) {
    currentStopId = params.get("stop_id");
    currentStopName = params.get("stop_name") || currentStopId;
    document.getElementById("stop-title").textContent = currentStopName;
    document.getElementById("stop-subtitle").textContent = "LTlive · Avgångstavla";
    document.getElementById("stop-search").value = currentStopName;
    loadDepartures();
}

// Fullscreen
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen();
    }
}

// ETA formatting
function formatEta(secs) {
    if (secs <= 0) return { text: "Nu", cls: "eta-now" };
    if (secs < 60) return { text: `${secs} s`, cls: "eta-now" };
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    const cls = m < 3 ? "eta-soon" : "eta-normal";
    return { text: `${m}:${String(s).padStart(2, "0")}`, cls };
}

// Live countdown
function startCountdown() {
    clearInterval(etaCountdownTimer);
    etaCountdownTimer = setInterval(() => {
        const now = Date.now() / 1000;
        document.querySelectorAll(".dep-eta[data-ts]").forEach(el => {
            const ts = parseFloat(el.dataset.ts);
            const secs = Math.round(ts - now);
            const { text, cls } = formatEta(secs);
            el.textContent = text;
            el.className = `dep-eta ${cls}`;
            const row = el.closest(".dep-row");
            if (row) row.classList.toggle("dep-now", secs <= 0);
        });
    }, 1000);
}

// Load stops for search
let stopHeadsigns = {}; // stop_id -> headsign string
async function loadStops() {
    try {
        const [stopsData, nextDep] = await Promise.all([
            fetch(`${API}/stops`).then(r => r.json()),
            fetch(`${API}/stops/next-departure`).then(r => r.json()),
        ]);
        allStops = stopsData.stops || [];
        for (const [sid, info] of Object.entries(nextDep)) {
            if (info.headsign) stopHeadsigns[sid] = info.headsign;
        }
    } catch {}
}
loadStops();

// Search
const searchInput = document.getElementById("stop-search");
const searchResults = document.getElementById("search-results");

searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim().toLowerCase();
    if (q.length < 2) { searchResults.classList.remove("open"); return; }
    const matches = allStops
        .filter(s => s.stop_name.toLowerCase().includes(q) && s.location_type !== 1)
        .slice(0, 12);
    if (matches.length === 0) { searchResults.classList.remove("open"); return; }
    searchResults.innerHTML = matches.map(s => {
        const dir = stopHeadsigns[s.stop_id];
        const sub = dir ? `<span class="search-result-dir">mot ${dir}</span>` : "";
        return `<div class="search-result-item" data-id="${s.stop_id}" data-name="${s.stop_name}">${s.stop_name}${sub}</div>`;
    }).join("");
    // Position dropdown below the input
    const rect = searchInput.getBoundingClientRect();
    searchResults.style.top = (searchInput.offsetHeight + 4) + "px";
    searchResults.style.width = searchInput.offsetWidth + "px";
    searchResults.classList.add("open");
});

searchResults.addEventListener("click", e => {
    const item = e.target.closest(".search-result-item");
    if (!item) return;
    currentStopId = item.dataset.id;
    currentStopName = item.dataset.name;
    searchInput.value = currentStopName;
    searchResults.classList.remove("open");
    document.getElementById("stop-title").textContent = currentStopName;
    document.getElementById("stop-subtitle").textContent = "LTlive · Avgångstavla";
    history.replaceState(null, "", `?stop_id=${encodeURIComponent(currentStopId)}&stop_name=${encodeURIComponent(currentStopName)}`);
    loadDepartures();
});

document.addEventListener("click", e => {
    if (!e.target.closest("#search-wrap")) searchResults.classList.remove("open");
});

// Load departures
async function loadDepartures() {
    if (!currentStopId) return;
    const board = document.getElementById("board");
    if (!board.querySelector(".dep-row")) {
        board.innerHTML = `<div class="board-msg">Hämtar avgångar…</div>`;
    }

    try {
        const data = await fetch(`${API}/departures/${encodeURIComponent(currentStopId)}`).then(r => r.json());
        renderBoard(data.departures || []);
    } catch {
        board.innerHTML = `<div class="board-msg">Kunde inte hämta avgångar</div>`;
    }

    // Refresh bar animation
    const bar = document.getElementById("refresh-bar");
    bar.style.transition = "none";
    bar.style.transform = "scaleX(0)";
    requestAnimationFrame(() => {
        bar.style.transition = "transform 20s linear";
        bar.style.transform = "scaleX(1)";
    });

    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(loadDepartures, 20000);
}

function renderBoard(departures) {
    const board = document.getElementById("board");
    const now = Date.now() / 1000;

    if (departures.length === 0) {
        board.innerHTML = `<div class="board-msg">Inga kommande avgångar</div>`;
        return;
    }

    board.innerHTML = departures.map(d => {
        const secs = Math.round(d.departure_time - now);
        const { text: etaText, cls: etaCls } = formatEta(secs);
        const clock = new Date(d.departure_time * 1000)
            .toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
        const bg = d.route_color ? `#${d.route_color}` : "#555";
        const fg = d.route_text_color ? `#${d.route_text_color}` : "#fff";
        const rt = d.is_realtime ? `<span class="dep-rt-badge">RT</span>` : "";
        const nowClass = secs <= 0 ? "dep-now" : "";
        return `<div class="dep-row ${nowClass}">
            <span class="dep-badge" style="background:${bg};color:${fg}">${d.route_short_name || "?"}</span>
            <span class="dep-headsign">${d.headsign || ""}${rt}</span>
            <span class="dep-clock">${clock}</span>
            <span class="dep-eta ${etaCls}" data-ts="${d.departure_time}">${etaText}</span>
        </div>`;
    }).join("");

    startCountdown();
}
</script>
<script>
(function(){var s=Math.random().toString(36).slice(2),t=Date.now(),p=location.pathname;
fetch('/api/stats/visit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:s,page:p}),keepalive:true}).catch(function(){});
function leave(){navigator.sendBeacon('/api/stats/leave',JSON.stringify({session_id:s,duration:Math.round((Date.now()-t)/1000)}));}
window.addEventListener('beforeunload',leave);
document.addEventListener('visibilitychange',function(){if(document.hidden)leave();});
})();
</script>
</body>
</html>
