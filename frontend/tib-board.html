<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tåg i Bergslagen – Avgångs- och ankomsttavla</title>
    <link rel="stylesheet" href="tib-board.css" />

</head>
<body>

<div id="header">
    <div id="header-left">
        <div id="tib-logo">TiB</div>
        <div>
            <div id="station-title">Välj station</div>
            <div id="station-subtitle">Tåg i Bergslagen · Avgångar &amp; ankomster</div>
        </div>
    </div>
    <div id="clock">--:--:--</div>
    <button id="fs-btn" title="Helskärm">⛶</button>
    <a id="back-btn" href="/">&#8592; Karta</a>
</div>

<div id="station-bar">
    <button class="station-btn" data-station="orebro-c">Örebro Resecentrum</button>
    <div id="station-search-wrap">
        <input id="station-search" type="text" placeholder="Sök annan station…" autocomplete="off" />
        <div id="station-search-results"></div>
    </div>
</div>

<div id="mode-bar">
    <div class="mode-tab active" id="tab-dep">&#9654; Avgångar</div>
    <div class="mode-tab" id="tab-arr">&#9664; Ankomster</div>
</div>

<div id="live-status">
    <span id="live-status-text">Hämtar tågpositioner…</span>
</div>

<div id="refresh-bar"></div>

<div id="station-messages"></div>

<div id="col-header" class="dep-grid">
    <span>Tid</span>
    <span>Ny tid</span>
    <span>Till</span>
    <span class="col-center">Spår</span>
    <span>Tågnr</span>
    <span>Bolag</span>
    <span class="col-right">Avgår om</span>
    <span>Anmärkning</span>
</div>

<div id="board-wrap">
    <div id="board">
        <div class="board-msg">Välj en station ovan</div>
    </div>
</div>

<script defer src="tib-board.js"></script>
<script src="analytics.js"></script>
</body>
</html>
