# Rate-limiting zones (evaluated in http context via conf.d include)
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=sse:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # --- Security headers ---
    add_header X-Content-Type-Options   "nosniff"                            always;
    add_header X-Frame-Options          "SAMEORIGIN"                         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy       "geolocation=*"                      always;
    # CSP: allow Leaflet from unpkg, CartoDB tiles, OSM attribution tiles
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' https://unpkg.com; \
         style-src 'self' 'unsafe-inline' https://unpkg.com; \
         img-src 'self' data: https://*.basemaps.cartocdn.com https://tile.openstreetmap.org; \
         connect-src 'self'; \
         frame-ancestors 'none'"                                             always;

    # Limit request body — no file uploads, stats POST is tiny
    client_max_body_size 4k;

    # Frontend static files — no cache on HTML so changes appear immediately
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(js|css)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SSE stream — long-lived connection, no buffering, strict rate limit
    location = /api/stream {
        limit_req zone=sse burst=2 nodelay;

        proxy_pass http://backend:5000/api/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
    }

    # API proxy to Flask backend
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
