services:
  backend:
    build:
      context: ./backend
    container_name: ltlive-backend
    environment:
      - TRAFIKLAB_GTFS_RT_KEY=${TRAFIKLAB_GTFS_RT_KEY}
      - TRAFIKLAB_GTFS_STATIC_KEY=${TRAFIKLAB_GTFS_STATIC_KEY}
      - OPERATOR=orebro
      - RT_POLL_SECONDS=5
      - GTFS_REFRESH_HOURS=24
    volumes:
      - gtfs-data:/app/data/gtfs
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ltlive-nginx
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gtfs-data:
