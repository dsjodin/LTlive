services:
  backend:
    build:
      context: ./backend
    container_name: ltlive-backend
    environment:
      # All values come from .env — docker-compose.yml contains no hardcoded config.
      # See .env.example for documentation on each variable.
      - OPERATOR=${OPERATOR:-orebro}
      - TZ=${TZ:-Europe/Stockholm}
      - TRAFIKLAB_API_KEY=${TRAFIKLAB_API_KEY:-}
      - TRAFIKLAB_GTFS_RT_KEY=${TRAFIKLAB_GTFS_RT_KEY:-}
      - TRAFIKLAB_GTFS_STATIC_KEY=${TRAFIKLAB_GTFS_STATIC_KEY:-}
      - OXYFI_API_KEY=${OXYFI_API_KEY:-}
      - TRAFIKVERKET_API_KEY=${TRAFIKVERKET_API_KEY:-}
      - TRAFIKVERKET_STATIONS=${TRAFIKVERKET_STATIONS:-}
      - TRAFIKVERKET_OPERATORS=${TRAFIKVERKET_OPERATORS:-}
      - TRAFIKVERKET_LOOKAHEAD_MINUTES=${TRAFIKVERKET_LOOKAHEAD_MINUTES:-120}
      - TRAFIKVERKET_POLL_SECONDS=${TRAFIKVERKET_POLL_SECONDS:-60}
      - TV_POSITION_CENTER_LAT=${TV_POSITION_CENTER_LAT:-59.2753}
      - TV_POSITION_CENTER_LON=${TV_POSITION_CENTER_LON:-15.2134}
      - TV_POSITION_RADIUS_KM=${TV_POSITION_RADIUS_KM:-150}
      - TIB_AGENCY_ID=${TIB_AGENCY_ID:-}
      - TIB_ROUTE_SHORT_NAMES=${TIB_ROUTE_SHORT_NAMES:-}
      - ROUTE_COLOR_OVERRIDES=${ROUTE_COLOR_OVERRIDES:-}
      - RT_POLL_SECONDS=${RT_POLL_SECONDS:-5}
      - GTFS_REFRESH_HOURS=${GTFS_REFRESH_HOURS:-24}
      - FRONTEND_POLL_INTERVAL_MS=${FRONTEND_POLL_INTERVAL_MS:-5000}
      - NEARBY_RADIUS_METERS=${NEARBY_RADIUS_METERS:-400}
      - MAP_CENTER_LAT=${MAP_CENTER_LAT:-59.2753}
      - MAP_CENTER_LON=${MAP_CENTER_LON:-15.2134}
      - MAP_DEFAULT_ZOOM=${MAP_DEFAULT_ZOOM:-13}
      - ENABLE_DEBUG_ENDPOINTS=${ENABLE_DEBUG_ENDPOINTS:-false}
      - TRAFFIC_ENABLED=${TRAFFIC_ENABLED:-true}
      - SITE_NAME=${SITE_NAME:-}
      - SITE_CONFIG_FILE=${SITE_CONFIG_FILE:-/app/data/config/site-config.json}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
    volumes:
      - gtfs-data:/app/data/gtfs
      - stats-data:/app/data/stats
      - traffic-data:/app/data/traffic
      - config-data:/app/data/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ltlive-nginx
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxy
      - default
    labels:
      - traefik.enable=true
      - traefik.http.routers.ltlive.rule=Host(`ltlive.storavalla.se`)
      - traefik.http.routers.ltlive.entrypoints=websecure
      - traefik.http.routers.ltlive.tls=true
      - traefik.http.routers.ltlive.tls.certresolver=le
      - traefik.http.services.ltlive.loadbalancer.server.port=80

volumes:
  gtfs-data:
  stats-data:
  traffic-data:
  config-data:

networks:
  default:
  proxy:
    name: proxy
    external: true
