services:
  backend:
    build:
      context: ./backend
    container_name: ltlive-backend
    environment:
      - TRAFIKLAB_API_KEY=${TRAFIKLAB_API_KEY:-}
      - TRAFIKLAB_GTFS_RT_KEY=${TRAFIKLAB_GTFS_RT_KEY:-}
      - TRAFIKLAB_GTFS_STATIC_KEY=${TRAFIKLAB_GTFS_STATIC_KEY:-}
      - OPERATOR=orebro
      - RT_POLL_SECONDS=${RT_POLL_SECONDS:-5}
      - GTFS_REFRESH_HOURS=24
      - NEARBY_RADIUS_METERS=${NEARBY_RADIUS_METERS:-400}
      - FRONTEND_POLL_INTERVAL_MS=${FRONTEND_POLL_INTERVAL_MS:-5000}
      - OXYFI_API_KEY=${OXYFI_API_KEY:-}
      - TRAFIKVERKET_API_KEY=${TRAFIKVERKET_API_KEY:-}
      - TRAFIKVERKET_STATIONS=${TRAFIKVERKET_STATIONS:-}
      - TRAFIKVERKET_OPERATORS=${TRAFIKVERKET_OPERATORS:-}
      - TRAFIKVERKET_POLL_SECONDS=${TRAFIKVERKET_POLL_SECONDS:-60}
      - ENABLE_DEBUG_ENDPOINTS=true
      - TZ=Europe/Stockholm
    volumes:
      - gtfs-data:/app/data/gtfs
      - stats-data:/app/data/stats
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ltlive-nginx
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxy
      - default
    labels:
      - traefik.enable=true
      - traefik.http.routers.ltlive.rule=Host(`ltlive.storavalla.se`)
      - traefik.http.routers.ltlive.entrypoints=websecure
      - traefik.http.routers.ltlive.tls=true
      - traefik.http.routers.ltlive.tls.certresolver=le
      - traefik.http.services.ltlive.loadbalancer.server.port=80

volumes:
  gtfs-data:
  stats-data:

networks:
  proxy:
    name: proxy
    external: true
